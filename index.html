// GRAPH TAB
// ========================
const graphCanvas = document.getElementById('graphCanvas');
const gCtx = graphCanvas.getContext('2d');
let graphPoints = [];      // {x, y, color} in graph coordinates
let graphLines = [];       // {p1Idx, p2Idx, color} indices into graphPoints
let graphFunctions = [];   // {expr, fn, color}
let graphTool = 'point';
let graphLineStart = null; // index of first point for line tool
let graphDragIdx = -1;
let graphLineColor = null;  // color for current line chain
let graphUndoStack = [];

function resizeGraphCanvas() {
    const container = graphCanvas.parentElement;
    if (!container) return;
    graphCanvas.width = container.clientWidth;
    graphCanvas.height = container.clientHeight;
    redrawGraphCanvas();
}

function getGraphScale() {
    const sx = parseFloat(document.getElementById('graphScaleX').value) || 1;
    const sy = parseFloat(document.getElementById('graphScaleY').value) || 1;
    return { sx, sy };
}

function getGraphOrigin() {
    return { ox: Math.floor(graphCanvas.width / 2), oy: Math.floor(graphCanvas.height / 2) };
}

const GRAPH_CELL = 30; // pixels per grid cell

function graphToPixel(gx, gy) {
    const { ox, oy } = getGraphOrigin();
    const { sx, sy } = getGraphScale();
    return { px: ox + (gx / sx) * GRAPH_CELL, py: oy - (gy / sy) * GRAPH_CELL };
}

function pixelToGraph(px, py) {
    const { ox, oy } = getGraphOrigin();
    const { sx, sy } = getGraphScale();
    return { gx: ((px - ox) / GRAPH_CELL) * sx, gy: ((oy - py) / GRAPH_CELL) * sy };
}

function snapToGrid(gx, gy) {
    const { sx, sy } = getGraphScale();
    return { gx: Math.round(gx / sx) * sx, gy: Math.round(gy / sy) * sy };
}

function fmtGraphVal(v) {
    const r = Math.round(v * 1000) / 1000;
    if (r === Math.round(r)) return r.toFixed(0);
    return r.toString().replace('.', ',');
}

function getLineEquation(x1, y1, x2, y2) {
    if (x1 === x2) {
        // Vertical line: x = constant
        return 'x = ' + fmtGraphVal(x1);
    }
    const a = (y2 - y1) / (x2 - x1);
    const b = y1 - a * x1;
    const aRound = Math.round(a * 10000) / 10000;
    const bRound = Math.round(b * 10000) / 10000;

    let eq = 'y = ';
    if (aRound === 0) {
        eq += fmtGraphVal(bRound);
    } else if (aRound === 1) {
        eq += 'x';
    } else if (aRound === -1) {
        eq += '-x';
    } else {
        eq += fmtGraphVal(aRound) + 'x';
    }

    if (aRound !== 0) {
        if (bRound > 0) eq += ' + ' + fmtGraphVal(bRound);
        else if (bRound < 0) eq += ' - ' + fmtGraphVal(Math.abs(bRound));
    }

    return eq;
}

const graphColorPalette = ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6'];
let graphColorIndex = 0;

function nextGraphColor() {
    const c = graphColorPalette[graphColorIndex % graphColorPalette.length];
    graphColorIndex++;
    return c;
}

function changeGraphItemColor(type, idx) {
    const input = document.createElement('input');
    input.type = 'color';
    input.value = type === 'func' ? graphFunctions[idx].color : graphLines[idx].color;
    input.style.position = 'absolute';
    input.style.opacity = '0';
    document.body.appendChild(input);
    input.addEventListener('input', () => {
        if (type === 'func') {
            graphFunctions[idx].color = input.value;
        } else {
            graphLines[idx].color = input.value;
        }
        updateGraphFuncList();
        updateLineEquations();
        redrawGraphCanvas();
    });
    input.addEventListener('change', () => { input.remove(); });
    input.addEventListener('blur', () => { input.remove(); });
    input.click();
}

function redrawGraphCanvas() {
    const w = graphCanvas.width, h = graphCanvas.height;
    gCtx.clearRect(0, 0, w, h);
    const { ox, oy } = getGraphOrigin();
    const { sx, sy } = getGraphScale();

    // Draw grid
    gCtx.strokeStyle = '#e2e8f0';
    gCtx.lineWidth = 0.5;
    for (let px = ox % GRAPH_CELL; px < w; px += GRAPH_CELL) {
        gCtx.beginPath(); gCtx.moveTo(px, 0); gCtx.lineTo(px, h); gCtx.stroke();
    }
    for (let py = oy % GRAPH_CELL; py < h; py += GRAPH_CELL) {
        gCtx.beginPath(); gCtx.moveTo(0, py); gCtx.lineTo(w, py); gCtx.stroke();
    }

    // Draw axes
    gCtx.strokeStyle = '#334155';
    gCtx.lineWidth = 2;
    gCtx.beginPath();
    gCtx.moveTo(ox, 0); gCtx.lineTo(ox, h);
    gCtx.moveTo(0, oy); gCtx.lineTo(w, oy);
    gCtx.stroke();

    // Arrow heads
    gCtx.fillStyle = '#334155';
    // Y arrow (top)
    gCtx.beginPath(); gCtx.moveTo(ox, 0); gCtx.lineTo(ox - 5, 10); gCtx.lineTo(ox + 5, 10); gCtx.fill();
    // X arrow (right)
    gCtx.beginPath(); gCtx.moveTo(w, oy); gCtx.lineTo(w - 10, oy - 5); gCtx.lineTo(w - 10, oy + 5); gCtx.fill();

    // Axis labels (tick marks + numbers)
    gCtx.fillStyle = '#64748b';
    gCtx.font = '11px sans-serif';
    gCtx.textAlign = 'center';
    gCtx.textBaseline = 'top';

    // Determine label interval: show every N grid lines to avoid clutter
    const labelEvery = GRAPH_CELL < 25 ? 2 : 1;

    // X axis labels
    let count = 0;
    for (let px = ox + GRAPH_CELL; px < w - 10; px += GRAPH_CELL) {
        count++;
        gCtx.beginPath(); gCtx.moveTo(px, oy - 3); gCtx.lineTo(px, oy + 3); gCtx.strokeStyle = '#334155'; gCtx.lineWidth = 1; gCtx.stroke();
        if (count % labelEvery === 0) {
            const val = fmtGraphVal(count * sx);
            gCtx.fillText(val, px, oy + 6);
        }
    }
    count = 0;
    for (let px = ox - GRAPH_CELL; px > 10; px -= GRAPH_CELL) {
        count++;
        gCtx.beginPath(); gCtx.moveTo(px, oy - 3); gCtx.lineTo(px, oy + 3); gCtx.strokeStyle = '#334155'; gCtx.lineWidth = 1; gCtx.stroke();
        if (count % labelEvery === 0) {
            const val = fmtGraphVal(-count * sx);
            gCtx.fillText(val, px, oy + 6);
        }
    }

    // Y axis labels
    gCtx.textAlign = 'right';
    gCtx.textBaseline = 'middle';
    count = 0;
    for (let py = oy - GRAPH_CELL; py > 10; py -= GRAPH_CELL) {
        count++;
        gCtx.beginPath(); gCtx.moveTo(ox - 3, py); gCtx.lineTo(ox + 3, py); gCtx.strokeStyle = '#334155'; gCtx.lineWidth = 1; gCtx.stroke();
        if (count % labelEvery === 0) {
            const val = fmtGraphVal(count * sy);
            gCtx.fillText(val, ox - 7, py);
        }
    }
    count = 0;
    for (let py = oy + GRAPH_CELL; py < h - 10; py += GRAPH_CELL) {
        count++;
        gCtx.beginPath(); gCtx.moveTo(ox - 3, py); gCtx.lineTo(ox + 3, py); gCtx.strokeStyle = '#334155'; gCtx.lineWidth = 1; gCtx.stroke();
        if (count % labelEvery === 0) {
            const val = fmtGraphVal(-count * sy);
            gCtx.fillText(val, ox - 7, py);
        }
    }

    // Origin label
    gCtx.textAlign = 'right';
    gCtx.textBaseline = 'top';
    gCtx.fillText('0', ox - 6, oy + 6);

    // Axis names
    gCtx.fillStyle = '#334155';
    gCtx.font = 'bold 13px sans-serif';
    gCtx.textAlign = 'left';
    gCtx.textBaseline = 'top';
    gCtx.fillText('x', w - 18, oy + 8);
    gCtx.textAlign = 'right';
    gCtx.textBaseline = 'bottom';
    gCtx.fillText('y', ox - 10, 16);

    // Draw functions
    for (const gf of graphFunctions) {
        drawGraphTabFunction(gf.fn, gf.color);
    }

    // Draw lines
    gCtx.lineWidth = 2;
    for (const line of graphLines) {
        const p1 = graphPoints[line.p1Idx];
        const p2 = graphPoints[line.p2Idx];
        if (!p1 || !p2) continue;
        const pp1 = graphToPixel(p1.x, p1.y);
        const pp2 = graphToPixel(p2.x, p2.y);
        gCtx.strokeStyle = line.color;
        gCtx.beginPath();
        gCtx.moveTo(pp1.px, pp1.py);
        gCtx.lineTo(pp2.px, pp2.py);
        gCtx.stroke();
    }

    // Update line equations list above canvas
    updateLineEquations();

    // Draw points
    const showCoords = document.getElementById('graphShowCoords').checked;
    for (let i = 0; i < graphPoints.length; i++) {
        const p = graphPoints[i];
        if (p._deleted) continue;
        const { px, py } = graphToPixel(p.x, p.y);
        gCtx.fillStyle = p.color;
        gCtx.beginPath();
        gCtx.arc(px, py, 5, 0, Math.PI * 2);
        gCtx.fill();
        gCtx.strokeStyle = '#fff';
        gCtx.lineWidth = 1.5;
        gCtx.stroke();

        if (showCoords) {
            gCtx.fillStyle = '#334155';
            gCtx.font = '11px sans-serif';
            gCtx.textAlign = 'left';
            gCtx.textBaseline = 'bottom';
            const label = `(${fmtGraphVal(p.x)}, ${fmtGraphVal(p.y)})`;
            gCtx.fillText(label, px + 8, py - 4);
        }
    }

    // Highlight selected line start point
    if (graphTool === 'line' && graphLineStart !== null) {
        const p = graphPoints[graphLineStart];
        if (p && !p._deleted) {
            const { px, py } = graphToPixel(p.x, p.y);
            gCtx.strokeStyle = '#ef4444';
            gCtx.lineWidth = 2;
            gCtx.beginPath();
            gCtx.arc(px, py, 8, 0, Math.PI * 2);
            gCtx.stroke();
        }
    }
}

function drawGraphTabFunction(fn, color) {
    const w = graphCanvas.width, h = graphCanvas.height;
    const { ox, oy } = getGraphOrigin();
    const { sx, sy } = getGraphScale();

    gCtx.strokeStyle = color;
    gCtx.lineWidth = 2.5;
    gCtx.beginPath();
    let started = false;

    for (let px = 0; px < w; px++) {
        const gx = ((px - ox) / GRAPH_CELL) * sx;
        const gy = fn(gx);
        const py = oy - (gy / sy) * GRAPH_CELL;

        if (isNaN(gy) || !isFinite(gy) || py < -1000 || py > h + 1000) {
            started = false;
            continue;
        }
        if (!started) { gCtx.moveTo(px, py); started = true; }
        else { gCtx.lineTo(px, py); }
    }
    gCtx.stroke();
}

function setGraphTool(tool) {
    graphTool = tool;
    graphLineStart = null;
    graphLineColor = null;
    ['point', 'line', 'segment', 'move', 'delete'].forEach(t => {
        const btn = document.getElementById('gt-' + t);
        if (btn) btn.classList.toggle('active', t === tool);
    });
    graphCanvas.style.cursor = tool === 'move' ? 'grab' : (tool === 'delete' ? 'crosshair' : 'crosshair');
}

function saveGraphUndo() {
    graphUndoStack.push({
        points: JSON.parse(JSON.stringify(graphPoints)),
        lines: JSON.parse(JSON.stringify(graphLines)),
        functions: graphFunctions.map(f => ({ expr: f.expr, color: f.color }))
    });
    if (graphUndoStack.length > 30) graphUndoStack.shift();
}

function undoGraphAction() {
    if (graphUndoStack.length === 0) return;
    const state = graphUndoStack.pop();
    graphPoints = state.points;
    graphLines = state.lines;
    graphFunctions = state.functions.map(f => ({ expr: f.expr, fn: parseGraphFunction(f.expr), color: f.color }));
    updateGraphFuncList();
    redrawGraphCanvas();
}

function clearGraphTab() {
    saveGraphUndo();
    graphPoints = [];
    graphLines = [];
    graphFunctions = [];
    graphLineStart = null;
    updateGraphFuncList();
    redrawGraphCanvas();
}

function findNearestPoint(mx, my, maxDist) {
    let best = -1, bestD = maxDist || 15;
    for (let i = 0; i < graphPoints.length; i++) {
        if (graphPoints[i]._deleted) continue;
        const { px, py } = graphToPixel(graphPoints[i].x, graphPoints[i].y);
        const d = Math.hypot(px - mx, py - my);
        if (d < bestD) { bestD = d; best = i; }
    }
    return best;
}

// Mouse handling for graph canvas
graphCanvas.addEventListener('mousedown', (e) => {
    const rect = graphCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const { gx, gy } = pixelToGraph(mx, my);
    const snapped = snapToGrid(gx, gy);
    const color = document.getElementById('graphPointColor').value;

    if (graphTool === 'point') {
        saveGraphUndo();
        graphPoints.push({ x: snapped.gx, y: snapped.gy, color });
        redrawGraphCanvas();
    } else if (graphTool === 'line' || graphTool === 'segment') {
        const near = findNearestPoint(mx, my, 15);
        if (graphLineStart === null) {
            graphLineColor = nextGraphColor();
            if (near >= 0) {
                graphLineStart = near;
            } else {
                // Create new point and start line
                saveGraphUndo();
                graphPoints.push({ x: snapped.gx, y: snapped.gy, color: graphLineColor });
                graphLineStart = graphPoints.length - 1;
            }
            redrawGraphCanvas();
        } else {
            let endIdx = near;
            if (endIdx < 0) {
                saveGraphUndo();
                graphPoints.push({ x: snapped.gx, y: snapped.gy, color: graphLineColor });
                endIdx = graphPoints.length - 1;
            } else {
                saveGraphUndo();
            }
            if (endIdx !== graphLineStart) {
                graphLines.push({ p1Idx: graphLineStart, p2Idx: endIdx, color: graphLineColor });
            }
            if (graphTool === 'line') {
                graphLineStart = endIdx;
            } else {
                graphLineStart = null;
                graphLineColor = null;
            }
            redrawGraphCanvas();
        }
    } else if (graphTool === 'move') {
        graphDragIdx = findNearestPoint(mx, my, 15);
        if (graphDragIdx >= 0) {
            saveGraphUndo();
            graphCanvas.style.cursor = 'grabbing';
        }
    } else if (graphTool === 'delete') {
        // Try to delete a point first
        const near = findNearestPoint(mx, my, 15);
        if (near >= 0) {
            saveGraphUndo();
            graphPoints[near]._deleted = true;
            // Remove lines connected to this point
            graphLines = graphLines.filter(l => l.p1Idx !== near && l.p2Idx !== near);
            redrawGraphCanvas();
            return;
        }
        // Try to delete a line
        for (let i = graphLines.length - 1; i >= 0; i--) {
            const l = graphLines[i];
            const p1 = graphPoints[l.p1Idx];
            const p2 = graphPoints[l.p2Idx];
            if (!p1 || !p2) continue;
            const pp1 = graphToPixel(p1.x, p1.y);
            const pp2 = graphToPixel(p2.x, p2.y);
            const dist = distToSegment(mx, my, pp1.px, pp1.py, pp2.px, pp2.py);
            if (dist < 8) {
                saveGraphUndo();
                graphLines.splice(i, 1);
                redrawGraphCanvas();
                return;
            }
        }
    }
});

graphCanvas.addEventListener('mousemove', (e) => {
    if (graphTool === 'move' && graphDragIdx >= 0) {
        const rect = graphCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const { gx, gy } = pixelToGraph(mx, my);
        const snapped = snapToGrid(gx, gy);
        graphPoints[graphDragIdx].x = snapped.gx;
        graphPoints[graphDragIdx].y = snapped.gy;
        redrawGraphCanvas();
    }
});

graphCanvas.addEventListener('mouseup', () => {
    if (graphTool === 'move') {
        graphDragIdx = -1;
        graphCanvas.style.cursor = 'grab';
    }
});

// Backspace/Delete to remove last point or undo last action
document.addEventListener('keydown', (e) => {
    // Only act when graph tab is active and focus is not in an input
    const graphTab = document.getElementById('tab-graph');
    if (!graphTab || !graphTab.classList.contains('active')) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

    if (e.key === 'Backspace' || e.key === 'Delete') {
        e.preventDefault();
        // Find last non-deleted point
        for (let i = graphPoints.length - 1; i >= 0; i--) {
            if (!graphPoints[i]._deleted) {
                saveGraphUndo();
                graphPoints[i]._deleted = true;
                // Remove lines connected to this point
                graphLines = graphLines.filter(l => l.p1Idx !== i && l.p2Idx !== i);
                // Reset line chain if this was the start point
                if (graphLineStart === i) {
                    graphLineStart = null;
                    graphLineColor = null;
                }
                redrawGraphCanvas();
                break;
            }
        }
    } else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        undoGraphAction();
    }
});

function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(px - x1, py - y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function applyGraphScalePreset(val) {
    if (!val) return;

function addGraphFunction() {

    try {

        const color = nextGraphColor();
        saveGraphUndo();
        graphFunctions.push({ expr, fn, color });
        input.value = '';
        updateGraphFuncList();
        redrawGraphCanvas();

}

function removeGraphLineGroup(indices) {

        graphLines.splice(idx, 1);
    }

}

function updateLineEquations() {
    const container = document.getElementById('graphLineEqList');
    // Group lines by color and equation to avoid duplicates from chained segments
    const seen = new Map(); // key: "color|eq" -> { eq, color, indices: [] }
    for (let i = 0; i < graphLines.length; i++) {
        const line = graphLines[i];
        const p1 = graphPoints[line.p1Idx];
        const p2 = graphPoints[line.p2Idx];
        if (!p1 || !p2 || p1._deleted || p2._deleted) continue;
        const eq = getLineEquation(p1.x, p1.y, p2.x, p2.y);
        if (!eq) continue;
        const key = line.color + '|' + eq;
        if (seen.has(key)) {
            seen.get(key).indices.push(i);
        } else {
            seen.set(key, { eq, color: line.color, indices: [i] });
        }
    }
    const groups = [...seen.values()];
    container.innerHTML = groups.map(g =>
        `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f1f5f9;border-radius:12px;font-family:Consolas,monospace;">
            <span ondblclick="changeGraphItemColor('line',${g.indices[0]})" style="width:12px;height:12px;border-radius:50%;background:${g.color};display:inline-block;cursor:pointer;border:2px solid transparent;" title="Dobbeltklik for at ændre farve"></span>
            ${g.eq}
            <button onclick="removeGraphLineGroup([${g.indices.join(',')}])" style="background:none;border:none;cursor:pointer;color:#ef4444;font-weight:bold;padding:0 2px;">×</button>
        </span>`
    ).join('');
}

function updateGraphFuncList() {
    const container = document.getElementById('graphFuncList');
    container.innerHTML = graphFunctions.map((f, i) =>
        `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f1f5f9;border-radius:12px;font-family:Consolas,monospace;">
            <span ondblclick="changeGraphItemColor('func',${i})" style="width:12px;height:12px;border-radius:50%;background:${f.color};display:inline-block;cursor:pointer;border:2px solid transparent;" title="Dobbeltklik for at ændre farve"></span>
            f(x) = ${f.expr}
            <button onclick="removeGraphFunction(${i})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-weight:bold;padding:0 2px;">×</button>
        </span>`
    ).join('');
}

const diagramCanvas = document.getElementById('diagramCanvas');
const dCtx = diagramCanvas.getContext('2d');
const diagramColors = ['#2563eb','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#6366f1','#14b8a6'];
let diagramData = [
    { label: '', value: '', color: diagramColors[0] },
    { label: '', value: '', color: diagramColors[1] },
    { label: '', value: '', color: diagramColors[2] }
];

function resizeDiagramCanvas() {
    const container = diagramCanvas.parentElement;
    if (!container) return;
    diagramCanvas.width = container.clientWidth;
    diagramCanvas.height = container.clientHeight;
    redrawDiagram();
}

function renderDiagramRows() {
    const tbody = document.getElementById('diagramRows');
    tbody.innerHTML = diagramData.map((d, i) =>
        `<tr>
            <td style="padding:3px 4px;"><input type="text" value="${d.label}" placeholder="Kategori ${i+1}" oninput="diagramData[${i}].label=this.value;redrawDiagram()"></td>
            <td style="padding:3px 4px;"><input type="number" value="${d.value}" placeholder="0" oninput="diagramData[${i}].value=this.value;redrawDiagram()"></td>
            <td style="padding:3px 4px;text-align:center;"><input type="color" value="${d.color}" style="width:24px;height:24px;padding:0;border:1px solid var(--border);border-radius:50%;cursor:pointer;" oninput="diagramData[${i}].color=this.value;redrawDiagram()"></td>
            <td style="padding:3px 4px;text-align:center;"><button onclick="removeDiagramRow(${i})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-weight:bold;font-size:1rem;padding:0 4px;" title="Fjern">×</button></td>
        </tr>`
    ).join('');
}

function addDiagramRow() {
    const ci = diagramData.length % diagramColors.length;
    diagramData.push({ label: '', value: '', color: diagramColors[ci] });
    renderDiagramRows();
    redrawDiagram();
}

function removeDiagramRow(idx) {
    if (diagramData.length <= 1) return;
    diagramData.splice(idx, 1);
    renderDiagramRows();
    redrawDiagram();
}

function redrawDiagram() {
    const w = diagramCanvas.width, h = diagramCanvas.height;
    dCtx.clearRect(0, 0, w, h);
    if (w === 0 || h === 0) return;

    const type = document.getElementById('diagramType').value;
    const title = document.getElementById('diagramTitle').value.trim();
    const entries = diagramData.filter(d => d.value !== '' && !isNaN(parseFloat(d.value)));
    if (entries.length === 0) {
        dCtx.fillStyle = '#94a3b8';
        dCtx.font = '14px sans-serif';
        dCtx.textAlign = 'center';
        dCtx.fillText('Indtast data for at se diagram', w/2, h/2);
        return;
    }

    const values = entries.map(e => parseFloat(e.value));
    const labels = entries.map((e, i) => e.label || 'Kategori ' + (i+1));
    const colors = entries.map(e => e.color);

    // Title — centered over pie chart center for pie, otherwise canvas center
    let topOffset = 10;
    if (title) {
        dCtx.fillStyle = '#1e293b';
        dCtx.font = 'bold 15px sans-serif';
        dCtx.textAlign = 'center';
        const titleX = (type === 'pie') ? w * 0.4 : w / 2;
        dCtx.fillText(title, titleX, 22);
        topOffset = 35;
    }

    if (type === 'bar') drawBarChart(values, labels, colors, topOffset);
    else if (type === 'hbar') drawHBarChart(values, labels, colors, topOffset);
    else if (type === 'pie') drawPieChart(values, labels, colors, topOffset);
    else if (type === 'line') drawLineChart(values, labels, colors, topOffset);
}

function niceScale(maxVal) {
    if (maxVal <= 0) return { niceMax: 1, step: 0.2, steps: 5 };
    const rough = maxVal / 5;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const residual = rough / mag;
    let niceStep;
    if (residual <= 1) niceStep = 1 * mag;
    else if (residual <= 2) niceStep = 2 * mag;
    else if (residual <= 5) niceStep = 5 * mag;
    else niceStep = 10 * mag;
    const niceMax = Math.ceil(maxVal / niceStep) * niceStep;
    const steps = Math.round(niceMax / niceStep);
    return { niceMax, step: niceStep, steps };
}

function drawBarChart(values, labels, colors, top) {
    const w = diagramCanvas.width, h = diagramCanvas.height;
    const padding = { left: 50, right: 20, bottom: 40, top: top };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    const rawMax = Math.max(...values, 0.001);
    const { niceMax, steps } = niceScale(rawMax);
    const barW = Math.min(60, (chartW / values.length) * 0.7);
    const gap = (chartW - barW * values.length) / (values.length + 1);

    // Y axis
    dCtx.strokeStyle = '#cbd5e1';
    dCtx.lineWidth = 1;
    dCtx.beginPath();
    dCtx.moveTo(padding.left, padding.top);
    dCtx.lineTo(padding.left, h - padding.bottom);
    dCtx.lineTo(w - padding.right, h - padding.bottom);
    dCtx.stroke();

    // Grid lines and Y labels
    dCtx.fillStyle = '#64748b';
    dCtx.font = '11px sans-serif';
    dCtx.textAlign = 'right';
    dCtx.textBaseline = 'middle';
    for (let i = 0; i <= steps; i++) {
        const y = h - padding.bottom - (i / steps) * chartH;
        const val = (niceMax * i / steps);
        dCtx.fillText(fmtDiagramVal(val), padding.left - 8, y);
        if (i > 0) {
            dCtx.strokeStyle = '#e2e8f0';
            dCtx.beginPath();
            dCtx.moveTo(padding.left, y);
            dCtx.lineTo(w - padding.right, y);
            dCtx.stroke();
        }
    }

    // Bars
    for (let i = 0; i < values.length; i++) {
        const x = padding.left + gap + i * (barW + gap);
        const barH = (values[i] / niceMax) * chartH;
        const y = h - padding.bottom - barH;

        dCtx.fillStyle = colors[i];
        dCtx.beginPath();
        dCtx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
        dCtx.fill();

        // Value on top
        dCtx.fillStyle = '#334155';
        dCtx.font = 'bold 11px sans-serif';
        dCtx.textAlign = 'center';
        dCtx.textBaseline = 'bottom';
        dCtx.fillText(fmtDiagramVal(values[i]), x + barW/2, y - 4);

        // Label below
        dCtx.fillStyle = '#64748b';
        dCtx.font = '11px sans-serif';
        dCtx.textBaseline = 'top';
        dCtx.fillText(labels[i], x + barW/2, h - padding.bottom + 6);
    }
}

function drawHBarChart(values, labels, colors, top) {
    const w = diagramCanvas.width, h = diagramCanvas.height;
    const maxLabel = labels.reduce((a, b) => a.length > b.length ? a : b, '');
    dCtx.font = '11px sans-serif';
    const labelW = Math.min(100, dCtx.measureText(maxLabel).width + 10);
    const padding = { left: labelW + 10, right: 40, bottom: 20, top: top };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    const rawMax = Math.max(...values, 0.001);
    const { niceMax } = niceScale(rawMax);
    const barH = Math.min(35, (chartH / values.length) * 0.7);
    const gap = (chartH - barH * values.length) / (values.length + 1);

    for (let i = 0; i < values.length; i++) {
        const y = padding.top + gap + i * (barH + gap);
        const barW = (values[i] / niceMax) * chartW;

        dCtx.fillStyle = colors[i];
        dCtx.beginPath();
        dCtx.roundRect(padding.left, y, barW, barH, [0, 4, 4, 0]);
        dCtx.fill();

        // Label
        dCtx.fillStyle = '#334155';
        dCtx.font = '11px sans-serif';
        dCtx.textAlign = 'right';
        dCtx.textBaseline = 'middle';
        dCtx.fillText(labels[i], padding.left - 6, y + barH/2);

        // Value
        dCtx.fillStyle = '#334155';
        dCtx.font = 'bold 11px sans-serif';
        dCtx.textAlign = 'left';
        dCtx.fillText(fmtDiagramVal(values[i]), padding.left + barW + 6, y + barH/2);
    }
}

function drawPieChart(values, labels, colors, top) {
    const w = diagramCanvas.width, h = diagramCanvas.height;
    const total = values.reduce((a, b) => a + b, 0);
    if (total === 0) return;
    const cx = w * 0.4;
    const cy = (h + top) / 2;
    const r = Math.min(cx - 20, cy - top - 10, (h - top) / 2 - 20);

    let angle = -Math.PI / 2;
    for (let i = 0; i < values.length; i++) {
        const slice = (values[i] / total) * Math.PI * 2;
        dCtx.fillStyle = colors[i];
        dCtx.beginPath();
        dCtx.moveTo(cx, cy);
        dCtx.arc(cx, cy, r, angle, angle + slice);
        dCtx.closePath();
        dCtx.fill();
        dCtx.strokeStyle = '#fff';
        dCtx.lineWidth = 2;
        dCtx.stroke();

        // Percentage label on slice
        if (slice > 0.15) {
            const midAngle = angle + slice / 2;
            const lx = cx + Math.cos(midAngle) * r * 0.65;
            const ly = cy + Math.sin(midAngle) * r * 0.65;
            dCtx.fillStyle = '#fff';
            dCtx.font = 'bold 12px sans-serif';
            dCtx.textAlign = 'center';
            dCtx.textBaseline = 'middle';
            dCtx.fillText(Math.round(values[i] / total * 100) + '%', lx, ly);
        }
        angle += slice;
    }

    // Legend to the right
    const legendX = w * 0.7;
    let legendY = top + 10;
    for (let i = 0; i < values.length; i++) {
        dCtx.fillStyle = colors[i];
        dCtx.fillRect(legendX, legendY, 12, 12);
        dCtx.fillStyle = '#334155';
        dCtx.font = '11px sans-serif';
        dCtx.textAlign = 'left';
        dCtx.textBaseline = 'middle';
        dCtx.fillText(labels[i] + ' (' + fmtDiagramVal(values[i]) + ')', legendX + 18, legendY + 6);
        legendY += 20;
    }
}

function drawLineChart(values, labels, colors, top) {
    const w = diagramCanvas.width, h = diagramCanvas.height;
    const padding = { left: 50, right: 20, bottom: 40, top: top };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    const rawMax = Math.max(...values, 0.001);
    const minVal = Math.min(...values, 0);
    const rawRange = rawMax - minVal || 1;
    const { niceMax, steps } = niceScale(rawRange);
    const niceMin = minVal < 0 ? -niceScale(-minVal).niceMax : 0;
    const range = niceMax + Math.abs(niceMin) || 1;
    const stepX = chartW / Math.max(values.length - 1, 1);

    // Axes
    dCtx.strokeStyle = '#cbd5e1';
    dCtx.lineWidth = 1;
    dCtx.beginPath();
    dCtx.moveTo(padding.left, padding.top);
    dCtx.lineTo(padding.left, h - padding.bottom);
    dCtx.lineTo(w - padding.right, h - padding.bottom);
    dCtx.stroke();

    // Grid and Y labels
    dCtx.fillStyle = '#64748b';
    dCtx.font = '11px sans-serif';
    dCtx.textAlign = 'right';
    dCtx.textBaseline = 'middle';
    for (let i = 0; i <= steps; i++) {
        const y = h - padding.bottom - (i / steps) * chartH;
        const val = niceMin + (range * i / steps);
        dCtx.fillText(fmtDiagramVal(val), padding.left - 8, y);
        if (i > 0) {
            dCtx.strokeStyle = '#e2e8f0';
            dCtx.beginPath();
            dCtx.moveTo(padding.left, y);
            dCtx.lineTo(w - padding.right, y);
            dCtx.stroke();
        }
    }

    // Line
    dCtx.strokeStyle = colors[0];
    dCtx.lineWidth = 2.5;
    dCtx.beginPath();
    const points = [];
    for (let i = 0; i < values.length; i++) {
        const x = padding.left + i * stepX;
        const y = h - padding.bottom - ((values[i] - niceMin) / range) * chartH;
        points.push({ x, y });
        if (i === 0) dCtx.moveTo(x, y);
        else dCtx.lineTo(x, y);
    }
    dCtx.stroke();

    // Area fill
    dCtx.globalAlpha = 0.1;
    dCtx.fillStyle = colors[0];
    dCtx.beginPath();
    dCtx.moveTo(points[0].x, h - padding.bottom);
    points.forEach(p => dCtx.lineTo(p.x, p.y));
    dCtx.lineTo(points[points.length-1].x, h - padding.bottom);
    dCtx.closePath();
    dCtx.fill();
    dCtx.globalAlpha = 1;

    // Points and labels
    for (let i = 0; i < points.length; i++) {
        dCtx.fillStyle = colors[i % colors.length];
        dCtx.beginPath();
        dCtx.arc(points[i].x, points[i].y, 5, 0, Math.PI * 2);
        dCtx.fill();
        dCtx.strokeStyle = '#fff';
        dCtx.lineWidth = 2;
        dCtx.stroke();

        // Value
        dCtx.fillStyle = '#334155';
        dCtx.font = 'bold 11px sans-serif';
        dCtx.textAlign = 'center';
        dCtx.textBaseline = 'bottom';
        dCtx.fillText(fmtDiagramVal(values[i]), points[i].x, points[i].y - 8);

        // X label
        dCtx.fillStyle = '#64748b';
        dCtx.font = '11px sans-serif';
        dCtx.textBaseline = 'top';
        dCtx.fillText(labels[i], points[i].x, h - padding.bottom + 6);
    }
}

function fmtDiagramVal(v) {
    if (v === Math.round(v)) return v.toFixed(0);
    return v.toFixed(1).replace('.', ',');
}

function insertDiagramToEditor() {
    const dataUrl = diagramCanvas.toDataURL('image/png');
    insertResizableImage(dataUrl, 'Diagram');
}

// Init diagram rows
renderDiagramRows();
new ResizeObserver(() => resizeDiagramCanvas()).observe(diagramCanvas.parentElement || document.body);

// ========================
// PERSISTENCE (localStorage)
// ========================
function saveState() {
    try {
        // Ensure formula cells show results, not formula text, before saving
        editor.querySelectorAll('td[data-formula], th[data-formula]').forEach(td => {
            if (td === currentFormulaCell) return; // Skip cell being edited
            const table = td.closest('table');
            if (table) {
                const result = evaluateFormula(td.dataset.formula, table);
                let display;
                if (typeof result === 'number' && td.dataset.format) {
                    if (td.dataset.format === 'kr') {
                        display = (Math.round(result * 100) / 100).toString().replace('.', ',') + ' kr.';
                    } else if (td.dataset.format === 'pct') {
                        display = (Math.round(result * 10) / 10).toString().replace('.', ',') + '%';
                    } else {
                        display = result.toString().replace('.', ',');
                    }
                } else {
                    display = typeof result === 'number' ? result.toString().replace('.', ',') : result;
                }
                td.innerText = display;
            }
        });
        localStorage.setItem('mat-editor', editor.innerHTML);
        localStorage.setItem('mat-tab', document.querySelector('.tool-tab.active')?.textContent || '');
        localStorage.setItem('mat-shapes', JSON.stringify(shapes));
        localStorage.setItem('mat-graphs', JSON.stringify(graphs.map(g => ({ expr: g.expr, color: g.color }))));
        localStorage.setItem('mat-calcExpr', calcExpression);
        localStorage.setItem('mat-calcResult', document.getElementById('calcResult').textContent);
        localStorage.setItem('mat-calcHistory', JSON.stringify(calcHistoryItems));
        localStorage.setItem('mat-showGrid', showGrid);
        localStorage.setItem('mat-showAxes', showAxes);
        // Graph tab
        localStorage.setItem('mat-graphPoints', JSON.stringify(graphPoints.filter(p => !p._deleted)));
        localStorage.setItem('mat-graphLines', JSON.stringify(graphLines));
        localStorage.setItem('mat-graphFunctions', JSON.stringify(graphFunctions.map(f => ({ expr: f.expr, color: f.color }))));
        localStorage.setItem('mat-graphScaleX', document.getElementById('graphScaleX').value);
        localStorage.setItem('mat-graphScaleY', document.getElementById('graphScaleY').value);
        // Diagram tab
        localStorage.setItem('mat-diagramData', JSON.stringify(diagramData));
        localStorage.setItem('mat-diagramType', document.getElementById('diagramType').value);
        localStorage.setItem('mat-diagramTitle', document.getElementById('diagramTitle').value);
    } catch(e) {}
}

function loadState() {
    try {
        const editorContent = localStorage.getItem('mat-editor');
        if (editorContent) { editor.innerHTML = editorContent; updateCounts(); }

        const tab = localStorage.getItem('mat-tab');
        if (tab) {
            const tabs = document.querySelectorAll('.tool-tab');
            tabs.forEach(t => {
                if (t.textContent === tab) t.click();
            });
        }

        const savedShapes = localStorage.getItem('mat-shapes');
        if (savedShapes) { shapes.length = 0; shapes.push(...JSON.parse(savedShapes)); }

        const savedGraphs = localStorage.getItem('mat-graphs');
        if (savedGraphs) {
            const gData = JSON.parse(savedGraphs);
            gData.forEach(g => {
                const fn = parseGraphFunction(g.expr);
                graphs.push({ fn, color: g.color, expr: g.expr });
            });
        }

        const savedCalcExpr = localStorage.getItem('mat-calcExpr');
        if (savedCalcExpr) { calcExpression = savedCalcExpr; document.getElementById('calcExpr').textContent = formatExpression(calcExpression); }

        const savedCalcResult = localStorage.getItem('mat-calcResult');
        if (savedCalcResult) document.getElementById('calcResult').textContent = savedCalcResult;

        const savedHistory = localStorage.getItem('mat-calcHistory');
        if (savedHistory) { calcHistoryItems = JSON.parse(savedHistory); updateCalcHistory(); }

        const savedGrid = localStorage.getItem('mat-showGrid');
        if (savedGrid !== null) {
            showGrid = savedGrid === 'true';
            document.getElementById('gridBtn').classList.toggle('active', showGrid);
        }
        const savedAxes = localStorage.getItem('mat-showAxes');
        if (savedAxes !== null) {
            showAxes = savedAxes === 'true';
            document.getElementById('axesBtn').classList.toggle('active', showAxes);
        }

        // Graph tab
        const savedGP = localStorage.getItem('mat-graphPoints');
        if (savedGP) { graphPoints = JSON.parse(savedGP); }
        const savedGL = localStorage.getItem('mat-graphLines');
        if (savedGL) { graphLines = JSON.parse(savedGL); }
        const savedGF = localStorage.getItem('mat-graphFunctions');
        if (savedGF) {
            const gfData = JSON.parse(savedGF);
            graphFunctions = gfData.map(f => ({ expr: f.expr, fn: parseGraphFunction(f.expr), color: f.color }));
            updateGraphFuncList();
        }
        const savedGSX = localStorage.getItem('mat-graphScaleX');
        if (savedGSX) document.getElementById('graphScaleX').value = savedGSX;
        const savedGSY = localStorage.getItem('mat-graphScaleY');
        if (savedGSY) document.getElementById('graphScaleY').value = savedGSY;

        // Diagram tab
        const savedDD = localStorage.getItem('mat-diagramData');
        if (savedDD) { diagramData = JSON.parse(savedDD); renderDiagramRows(); }
        const savedDT = localStorage.getItem('mat-diagramType');
        if (savedDT) document.getElementById('diagramType').value = savedDT;
        const savedDTitle = localStorage.getItem('mat-diagramTitle');
        if (savedDTitle) document.getElementById('diagramTitle').value = savedDTitle;
    } catch(e) {}
}

// Save periodically and on changes
editor.addEventListener('input', saveState);
setInterval(saveState, 2000);
window.addEventListener('beforeunload', saveState);

// ========================
// INIT
// ========================
loadState();
// Clean up any leftover plus buttons from old saves
editor.querySelectorAll('.table-plus-btn').forEach(el => el.remove());
// Recalc all table formulas on load
recalcAllTables();
resizeCanvas();
// Detect example content loaded from localStorage
if (editor.innerHTML.includes('Rabatter i SuperBilka')) {
    exampleActive = true;
    const exBtn = document.getElementById('exampleBtn');
    exBtn.style.display = '';
    exBtn.textContent = '✕ Fjern eksempel';
}
