function drawGrid() {
    if (!showGrid) return;
    const w = canvas.width;
    const h = canvas.height;
    const step = 10; // 5mm per grid square, 2 squares = 1cm
    // Draw 5mm grid (lighter)
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= w; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    for (let y = 0; y <= h; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
    // Draw 1cm grid (darker)
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 0.8;
    for (let x = 0; x <= w; x += step * 2) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    for (let y = 0; y <= h; y += step * 2) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
}

function drawAxes() {
    if (!showAxes) return;
    const w = canvas.width;
    const h = canvas.height;
    const step = 20;
    const cx = Math.floor(w / 2);
    const cy = Math.floor(h / 2);

    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, h);
    ctx.moveTo(0, cy);
    ctx.lineTo(w, cy);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = '#64748b';
    ctx.font = '10px sans-serif';
    for (let x = cx + step * 5; x < w; x += step * 5) {
        const val = (x - cx) / step;
        ctx.fillText(val, x - 5, cy + 14);
    }
    for (let x = cx - step * 5; x > 0; x -= step * 5) {
        const val = (x - cx) / step;
        ctx.fillText(val, x - 8, cy + 14);
    }
    for (let y = cy - step * 5; y > 0; y -= step * 5) {
        const val = (cy - y) / step;
        ctx.fillText(val, cx + 4, y + 4);
    }
    for (let y = cy + step * 5; y < h; y += step * 5) {
        const val = (cy - y) / step;
        ctx.fillText(val, cx + 4, y + 4);
    }
}

function redrawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawAxes();

    // Draw graphs
    for (const g of graphs) {
        drawGraphLine(g.fn, g.color);
    }

    // Draw shapes
    for (const shape of shapes) {
        drawShape(shape);
    }
    // Draw measurements if enabled
    if (document.getElementById('geoMeasure')?.checked) {
        for (const shape of shapes) {
            drawMeasurements(shape);
        }
    }
}

const CM_SCALE = 20; // 20px = 1cm
function fmtCm(px) { const v = +(px / CM_SCALE).toFixed(1); return v === Math.round(v) ? v.toFixed(0) : v.toFixed(1); }

function drawMeasurements(shape) {
    ctx.save();
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cl = shape.customLabels || {};
    const hl = shape._hiddenLabels || {};
    // Returns label text, or null if hidden/deleted
    function lbl(dim, auto) { if (hl[dim]) return null; if (dim in cl) return cl[dim] || null; return auto; }

    switch (shape.type) {
        case 'rect': {
            const x = shape.w < 0 ? shape.x + shape.w : shape.x;
            const y = shape.h < 0 ? shape.y + shape.h : shape.y;
            const w = Math.abs(shape.w);
            const h = Math.abs(shape.h);
            const wt = lbl('w', 'b = ' + fmtCm(w) + ' cm');
            if (wt) ctx.fillText(wt, x + w / 2, y + h + 14);
            ctx.textAlign = 'right';
            const ht = lbl('h', 'h = ' + fmtCm(h) + ' cm');
            if (ht) ctx.fillText(ht, x - 8, y + h / 2);
            break;
        }
        case 'circle': {
            const rt = lbl('r', 'r = ' + fmtCm(shape.r) + ' cm');
            if (rt) {
                ctx.beginPath();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                ctx.moveTo(shape.cx, shape.cy);
                ctx.lineTo(shape.cx + shape.r, shape.cy);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillText(rt, shape.cx + shape.r / 2, shape.cy - 10);
            }
            break;
        }
        case 'diamond': {
            const wt = lbl('w', 'b = ' + fmtCm(shape.hw * 2) + ' cm');
            if (wt) ctx.fillText(wt, shape.cx, shape.cy + shape.hh + 14);
            ctx.textAlign = 'right';
            const ht = lbl('h', 'h = ' + fmtCm(shape.hh * 2) + ' cm');
            if (ht) ctx.fillText(ht, shape.cx - shape.hw - 8, shape.cy);
            break;
        }
        case 'triangle': {
            const sides = [
                { x1: shape.x1, y1: shape.y1, x2: shape.x2, y2: shape.y2 },
                { x1: shape.x2, y1: shape.y2, x2: shape.x3, y2: shape.y3 },
                { x1: shape.x3, y1: shape.y3, x2: shape.x1, y2: shape.y1 },
            ];
            sides.forEach((s, si) => {
                const len = Math.sqrt((s.x2 - s.x1) ** 2 + (s.y2 - s.y1) ** 2);
                const t = lbl('side' + si, fmtCm(len) + ' cm');
                if (!t) return;
                const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2;
                const dx = s.y2 - s.y1, dy = -(s.x2 - s.x1);
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                ctx.fillText(t, mx + dx / d * 14, my + dy / d * 14);
            });
            break;
        }
        case 'line': {
            const len = Math.sqrt((shape.x2 - shape.x1) ** 2 + (shape.y2 - shape.y1) ** 2);
            const t = lbl('len', fmtCm(len) + ' cm');
            if (!t) break;
            const mx = (shape.x1 + shape.x2) / 2, my = (shape.y1 + shape.y2) / 2;
            const dx = shape.y2 - shape.y1, dy = -(shape.x2 - shape.x1);
            const d = Math.sqrt(dx * dx + dy * dy) || 1;
            ctx.fillText(t, mx + dx / d * 12, my + dy / d * 12);
            break;
        }
    }
    ctx.restore();
}

function getMeasurementLabels(shape, idx) {
    const labels = [];
    const cl = shape.customLabels || {};
    function lt(dim, auto) { return (dim in cl) ? (cl[dim] || '') : auto; }
    switch (shape.type) {
        case 'rect': {
            const x = shape.w < 0 ? shape.x + shape.w : shape.x;
            const y = shape.h < 0 ? shape.y + shape.h : shape.y;
            const w = Math.abs(shape.w), h = Math.abs(shape.h);
            labels.push({ x: x + w / 2, y: y + h + 14, text: lt('w', 'b = ' + fmtCm(w) + ' cm'), dim: 'w', idx });
            labels.push({ x: x - 8, y: y + h / 2, text: lt('h', 'h = ' + fmtCm(h) + ' cm'), dim: 'h', idx });
            break;
        }
        case 'circle':
            labels.push({ x: shape.cx + shape.r / 2, y: shape.cy - 10, text: lt('r', 'r = ' + fmtCm(shape.r) + ' cm'), dim: 'r', idx });
            break;
        case 'diamond':
            labels.push({ x: shape.cx, y: shape.cy + shape.hh + 14, text: lt('w', 'b = ' + fmtCm(shape.hw * 2) + ' cm'), dim: 'w', idx });
            labels.push({ x: shape.cx - shape.hw - 8, y: shape.cy, text: lt('h', 'h = ' + fmtCm(shape.hh * 2) + ' cm'), dim: 'h', idx });
            break;
        case 'triangle': {
            const sides = [
                { x1: shape.x1, y1: shape.y1, x2: shape.x2, y2: shape.y2 },
                { x1: shape.x2, y1: shape.y2, x2: shape.x3, y2: shape.y3 },
                { x1: shape.x3, y1: shape.y3, x2: shape.x1, y2: shape.y1 },
            ];
            sides.forEach((s, si) => {
                const len = Math.sqrt((s.x2 - s.x1) ** 2 + (s.y2 - s.y1) ** 2);
                const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2;
                const dx = s.y2 - s.y1, dy = -(s.x2 - s.x1);
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                labels.push({ x: mx + dx / d * 14, y: my + dy / d * 14, text: lt('side' + si, fmtCm(len) + ' cm'), dim: 'side' + si, idx });
            });
            break;
        }
        case 'line': {
            const len = Math.sqrt((shape.x2 - shape.x1) ** 2 + (shape.y2 - shape.y1) ** 2);
            const mx = (shape.x1 + shape.x2) / 2, my = (shape.y1 + shape.y2) / 2;
            const dx = shape.y2 - shape.y1, dy = -(shape.x2 - shape.x1);
            const d = Math.sqrt(dx * dx + dy * dy) || 1;
            labels.push({ x: mx + dx / d * 12, y: my + dy / d * 12, text: lt('len', fmtCm(len) + ' cm'), dim: 'len', idx });
            break;
        }
    }
    return labels;
}

function applyMeasurementEdit(shape, dim, newCm) {
    const newPx = newCm * CM_SCALE;
    switch (shape.type) {
        case 'rect':
            if (dim === 'w') shape.w = shape.w < 0 ? -newPx : newPx;
            else if (dim === 'h') shape.h = shape.h < 0 ? -newPx : newPx;
            break;
        case 'circle':
            if (dim === 'r') shape.r = newPx;
            break;
        case 'diamond':
            if (dim === 'w') shape.hw = newPx / 2;
            else if (dim === 'h') shape.hh = newPx / 2;
            break;
        case 'triangle': {
            const sideIdx = parseInt(dim.replace('side', ''));
            const pts = [{x:shape.x1,y:shape.y1},{x:shape.x2,y:shape.y2},{x:shape.x3,y:shape.y3}];
            const a = pts[sideIdx], b = pts[(sideIdx + 1) % 3];
            const oldLen = Math.sqrt((b.x - a.x) ** 2 + (b.y - a.y) ** 2) || 1;
            const scale = newPx / oldLen;
            const keys = [['x1','y1'],['x2','y2'],['x3','y3']];
            const bk = keys[(sideIdx + 1) % 3];
            shape[bk[0]] = a.x + (b.x - a.x) * scale;
            shape[bk[1]] = a.y + (b.y - a.y) * scale;
            break;
        }
        case 'line': {
            const oldLen = Math.sqrt((shape.x2 - shape.x1) ** 2 + (shape.y2 - shape.y1) ** 2) || 1;
            const scale = newPx / oldLen;
            shape.x2 = shape.x1 + (shape.x2 - shape.x1) * scale;
            shape.y2 = shape.y1 + (shape.y2 - shape.y1) * scale;
            break;
        }
    }
}

let editingMeasurement = false;
canvas.addEventListener('dblclick', (e) => {
    if (!document.getElementById('geoMeasure')?.checked) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hitRadius = 20;

    for (let i = shapes.length - 1; i >= 0; i--) {
        const labels = getMeasurementLabels(shapes[i], i);
        for (const label of labels) {
            if (Math.abs(mx - label.x) < hitRadius + 20 && Math.abs(my - label.y) < hitRadius) {
                e.stopPropagation();
                e.preventDefault();
                editingMeasurement = true;
                const container = canvas.parentElement;
                const shape = shapes[label.idx];
                const scaleOff = shape.noScale && shape.noScale[label.dim];

                // Hide this label on canvas while editing
                if (!shape._hiddenLabels) shape._hiddenLabels = {};
                shape._hiddenLabels[label.dim] = true;
                redrawCanvas();

                const wrap = document.createElement('div');
                wrap.className = 'measure-edit-wrap';
                Object.assign(wrap.style, {
                    position: 'absolute',
                    left: (label.x) + 'px',
                    top: (label.y) + 'px',
                    transform: 'translate(-50%, -50%)',
                    zIndex: '100',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px',
                    pointerEvents: 'auto',
                });

                const editable = document.createElement('span');
                editable.contentEditable = 'true';
                editable.textContent = label.text;
                editable.className = 'measure-edit';
                Object.assign(editable.style, {
                    font: '11px sans-serif',
                    color: '#333',
                    whiteSpace: 'nowrap',
                    outline: 'none',
                    borderBottom: '1.5px solid #2563eb',
                    background: 'rgba(255,255,255,0.9)',
                    padding: '0 3px',
                    caretColor: '#2563eb',
                    minWidth: '20px',
                    textAlign: 'center',
                });

                let autoScale = !scaleOff;
                const scaleBtn = document.createElement('button');
                scaleBtn.title = autoScale ? 'Tilpas størrelse er slået til' : 'Tilpas størrelse er slået fra';
                Object.assign(scaleBtn.style, {
                    width: '18px', height: '18px', padding: '0',
                    border: '1px solid ' + (autoScale ? '#2563eb' : '#cbd5e1'),
                    borderRadius: '4px', cursor: 'pointer',
                    background: autoScale ? '#2563eb' : 'white',
                    color: autoScale ? 'white' : '#94a3b8',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: '11px', lineHeight: '1', flexShrink: '0',
                });
                scaleBtn.innerHTML = '⇔';
                scaleBtn.addEventListener('mousedown', (ev) => { ev.preventDefault(); ev.stopPropagation(); });
                scaleBtn.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    autoScale = !autoScale;
                    scaleBtn.style.background = autoScale ? '#2563eb' : 'white';
                    scaleBtn.style.border = '1px solid ' + (autoScale ? '#2563eb' : '#cbd5e1');
                    scaleBtn.style.color = autoScale ? 'white' : '#94a3b8';
                    scaleBtn.title = autoScale ? 'Tilpas størrelse er slået til' : 'Tilpas størrelse er slået fra';
                    editable.focus();
                });

                wrap.appendChild(editable);
                wrap.appendChild(scaleBtn);
                container.appendChild(wrap);

                // Focus after a short delay to avoid immediate blur
                requestAnimationFrame(() => {
                    editable.focus();
                    const range = document.createRange();
                    range.selectNodeContents(editable);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);

                    let finished = false;
                    const finish = () => {
                        if (finished) return;
                        finished = true;
                        editingMeasurement = false;
                        const text = editable.textContent.trim();
                        if (autoScale) {
                            const numMatch = text.match(/([\d.]+)/);
                            if (numMatch) {
                                const val = parseFloat(numMatch[1]);
                                if (val > 0 && !isNaN(val)) {
                                    applyMeasurementEdit(shapes[label.idx], label.dim, val);
                                }
                            }
                        }
                        // Store custom label + scale preference
                        if (!shape.customLabels) shape.customLabels = {};
                        shape.customLabels[label.dim] = text !== '' ? text : '';
                        if (!shape.noScale) shape.noScale = {};
                        shape.noScale[label.dim] = !autoScale;
                        delete shape._hiddenLabels[label.dim];
                        wrap.remove();
                        redrawCanvas();
                    };
                    editable.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter') { ev.preventDefault(); finish(); }
                        if (ev.key === 'Escape') { finished = true; editingMeasurement = false; delete shape._hiddenLabels[label.dim]; wrap.remove(); redrawCanvas(); }
                    });
                    editable.addEventListener('blur', (ev) => {
                        // Don't finish if focus moved to the scale button
                        if (wrap.contains(ev.relatedTarget)) return;
                        finish();
                    });
                });
                return;
            }
        }
    }
});

function getShapeCenter(shape) {
    const b = getShapeBounds(shape);
    return { x: b.x + b.w / 2, y: b.y + b.h / 2 };
}

function drawShape(shape) {
    ctx.save();
    ctx.strokeStyle = shape.color;
    ctx.lineWidth = shape.width;
    ctx.fillStyle = shape.color + '33';

    // Apply rotation if set
    if (shape.rotation) {
        const c = getShapeCenter(shape);
        ctx.translate(c.x, c.y);
        ctx.rotate(shape.rotation);
        ctx.translate(-c.x, -c.y);
    }

    switch (shape.type) {
        case 'line':
            ctx.beginPath();
            ctx.moveTo(shape.x1, shape.y1);
            ctx.lineTo(shape.x2, shape.y2);
            ctx.stroke();
            break;
        case 'rect':
            ctx.beginPath();
            ctx.rect(shape.x, shape.y, shape.w, shape.h);
            if (shape.fill) ctx.fill();
            ctx.stroke();
            break;
        case 'circle':
            ctx.beginPath();
            ctx.arc(shape.cx, shape.cy, shape.r, 0, Math.PI * 2);
            if (shape.fill) ctx.fill();
            ctx.stroke();
            if (shape.dotCenter) {
                ctx.beginPath();
                ctx.arc(shape.cx, shape.cy, 3, 0, Math.PI * 2);
                ctx.fillStyle = shape.color;
                ctx.fill();
            }
            break;
        case 'diamond':
            ctx.beginPath();
            ctx.moveTo(shape.cx, shape.cy - shape.hh);
            ctx.lineTo(shape.cx + shape.hw, shape.cy);
            ctx.lineTo(shape.cx, shape.cy + shape.hh);
            ctx.lineTo(shape.cx - shape.hw, shape.cy);
            ctx.closePath();
            if (shape.fill) ctx.fill();
            ctx.stroke();
            break;
        case 'triangle':
            ctx.beginPath();
            ctx.moveTo(shape.x1, shape.y1);
            ctx.lineTo(shape.x2, shape.y2);
            ctx.lineTo(shape.x3, shape.y3);
            ctx.closePath();
            if (shape.fill) ctx.fill();
            ctx.stroke();
            break;
        case 'freehand':
            if (shape.points.length < 2) { ctx.restore(); return; }
            ctx.beginPath();
            ctx.moveTo(shape.points[0].x, shape.points[0].y);
            for (let i = 1; i < shape.points.length; i++) {
                ctx.lineTo(shape.points[i].x, shape.points[i].y);
            }
            ctx.stroke();
            break;
        case 'text':
            ctx.font = (shape.fontSize || shape.width * 8) + 'px sans-serif';
            ctx.fillStyle = shape.color;
            ctx.fillText(shape.text, shape.x, shape.y);
            break;
        case 'angle': {
            // Draw two arms from vertex
            ctx.beginPath();
            ctx.moveTo(shape.x1, shape.y1);
            ctx.lineTo(shape.vx, shape.vy);
            ctx.lineTo(shape.x2, shape.y2);
            ctx.stroke();

            // Calculate angles for arc
            const aA1 = Math.atan2(shape.y1 - shape.vy, shape.x1 - shape.vx);
            const aA2 = Math.atan2(shape.y2 - shape.vy, shape.x2 - shape.vx);

            // Determine arc direction (always draw the smaller angle)
            let aDiff = aA2 - aA1;
            while (aDiff < -Math.PI) aDiff += Math.PI * 2;
            while (aDiff > Math.PI) aDiff -= Math.PI * 2;
            const arcCCW = aDiff < 0;

            // Draw arc
            const arcR = Math.min(30,
                Math.sqrt((shape.x1 - shape.vx) ** 2 + (shape.y1 - shape.vy) ** 2) * 0.3,
                Math.sqrt((shape.x2 - shape.vx) ** 2 + (shape.y2 - shape.vy) ** 2) * 0.3
            );
            ctx.beginPath();
            ctx.arc(shape.vx, shape.vy, arcR, aA1, aA2, arcCCW);
            ctx.stroke();

            // Right angle marker (small square) if ~90°
            if (Math.abs(shape.degrees - 90) < 1.5) {
                const sq = arcR * 0.6;
                const dir1x = Math.cos(aA1), dir1y = Math.sin(aA1);
                const dir2x = Math.cos(aA2), dir2y = Math.sin(aA2);
                ctx.beginPath();
                ctx.moveTo(shape.vx + dir1x * sq, shape.vy + dir1y * sq);
                ctx.lineTo(shape.vx + dir1x * sq + dir2x * sq, shape.vy + dir1y * sq + dir2y * sq);
                ctx.lineTo(shape.vx + dir2x * sq, shape.vy + dir2y * sq);
                ctx.stroke();
            }

            // Draw degree label
            const midAngle = aA1 + aDiff / 2;
            const labelR = arcR + 16;
            const labelX = shape.vx + Math.cos(midAngle) * labelR;
            const labelY = shape.vy + Math.sin(midAngle) * labelR;
            ctx.font = '12px sans-serif';
            ctx.fillStyle = shape.color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const degText = shape.degrees === Math.round(shape.degrees) ? shape.degrees.toFixed(0) : shape.degrees.toFixed(1);
            ctx.fillText(degText + '°', labelX, labelY);
            break;
        }
    }
    ctx.restore();
}

// Un-rotate a point relative to a shape's center (for hit testing rotated shapes)
function unrotatePoint(x, y, shape) {
    if (!shape.rotation) return { x, y };
    const c = getShapeCenter(shape);
    const cos = Math.cos(-shape.rotation);
    const sin = Math.sin(-shape.rotation);
    const dx = x - c.x, dy = y - c.y;
    return { x: c.x + dx * cos - dy * sin, y: c.y + dx * sin + dy * cos };
}

// Hit test - find shape at position
function hitTestShape(ox, oy) {
    const margin = 8;
    for (let i = shapes.length - 1; i >= 0; i--) {
        const s = shapes[i];
        // Un-rotate mouse coords if shape is rotated
        const { x, y } = unrotatePoint(ox, oy, s);
        switch (s.type) {
            case 'rect':
                if (x >= s.x - margin && x <= s.x + s.w + margin && y >= s.y - margin && y <= s.y + s.h + margin) return i;
                break;
            case 'circle':
                const dist = Math.sqrt((x - s.cx) ** 2 + (y - s.cy) ** 2);
                if (dist <= s.r + margin) return i;
                break;
            case 'line':
                const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len === 0) break;
                const t = Math.max(0, Math.min(1, ((x - s.x1) * dx + (y - s.y1) * dy) / (len * len)));
                const px = s.x1 + t * dx, py = s.y1 + t * dy;
                if (Math.sqrt((x - px) ** 2 + (y - py) ** 2) < margin + 4) return i;
                break;
            case 'diamond':
                if (x >= s.cx - s.hw - margin && x <= s.cx + s.hw + margin && y >= s.cy - s.hh - margin && y <= s.cy + s.hh + margin) return i;
                break;
            case 'triangle':
                // Bounding box check
                const minX = Math.min(s.x1, s.x2, s.x3), maxX = Math.max(s.x1, s.x2, s.x3);
                const minY = Math.min(s.y1, s.y2, s.y3), maxY = Math.max(s.y1, s.y2, s.y3);
                if (x >= minX - margin && x <= maxX + margin && y >= minY - margin && y <= maxY + margin) return i;
                break;
            case 'text':
                ctx.font = (s.fontSize || s.width * 8) + 'px sans-serif';
                const tw = ctx.measureText(s.text).width;
                if (x >= s.x - margin && x <= s.x + tw + margin && y >= s.y - s.width * 8 - margin && y <= s.y + margin) return i;
                break;
            case 'freehand':
                for (const p of s.points) {
                    if (Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2) < margin + 4) return i;
                }
                break;
            case 'angle': {
                // Hit test both arms
                const arms = [
                    { x1: s.vx, y1: s.vy, x2: s.x1, y2: s.y1 },
                    { x1: s.vx, y1: s.vy, x2: s.x2, y2: s.y2 }
                ];
                for (const arm of arms) {
                    const adx = arm.x2 - arm.x1, ady = arm.y2 - arm.y1;
                    const alen = Math.sqrt(adx * adx + ady * ady);
                    if (alen === 0) continue;
                    const t = Math.max(0, Math.min(1, ((x - arm.x1) * adx + (y - arm.y1) * ady) / (alen * alen)));
                    const px = arm.x1 + t * adx, py = arm.y1 + t * ady;
                    if (Math.sqrt((x - px) ** 2 + (y - py) ** 2) < margin + 4) return i;
                }
                // Hit test vertex
                if (Math.sqrt((x - s.vx) ** 2 + (y - s.vy) ** 2) < margin + 6) return i;
                break;
            }
        }
    }
    return -1;
}

function moveShape(shape, dx, dy) {
    switch (shape.type) {
        case 'rect': shape.x += dx; shape.y += dy; break;
        case 'diamond': shape.cx += dx; shape.cy += dy; break;
        case 'circle': shape.cx += dx; shape.cy += dy; break;
        case 'line': shape.x1 += dx; shape.y1 += dy; shape.x2 += dx; shape.y2 += dy; break;
        case 'triangle': shape.x1 += dx; shape.y1 += dy; shape.x2 += dx; shape.y2 += dy; shape.x3 += dx; shape.y3 += dy; break;
        case 'text': shape.x += dx; shape.y += dy; break;
        case 'freehand': shape.points.forEach(p => { p.x += dx; p.y += dy; }); break;
        case 'angle': shape.vx += dx; shape.vy += dy; shape.x1 += dx; shape.y1 += dy; shape.x2 += dx; shape.y2 += dy; break;
    }
}

// Delete button on hover
let deleteBtn = null;
let dupBtn = null;
let deleteBtnIdx = -1;

function getShapeTopRight(idx) {
    const s = shapes[idx];
    switch (s.type) {
        case 'rect': {
            const b = getShapeBounds(s);
            return { x: b.x + b.w, y: b.y };
        }
        case 'diamond': return { x: s.cx + s.hw, y: s.cy - s.hh };
        case 'circle': return { x: s.cx + s.r * 0.7, y: s.cy - s.r * 0.7 };
        case 'line': return { x: Math.max(s.x1, s.x2), y: Math.min(s.y1, s.y2) };
        case 'triangle': return { x: Math.max(s.x1, s.x2, s.x3), y: Math.min(s.y1, s.y2, s.y3) };
        case 'text':
            ctx.font = (s.fontSize || s.width * 8) + 'px sans-serif';
            return { x: s.x + ctx.measureText(s.text).width, y: s.y - s.width * 8 };
        case 'freehand':
            let maxX = -Infinity, minY = Infinity;
            s.points.forEach(p => { if (p.x > maxX) maxX = p.x; if (p.y < minY) minY = p.y; });
            return { x: maxX, y: minY };
        case 'angle':
            return { x: Math.max(s.vx, s.x1, s.x2), y: Math.min(s.vy, s.y1, s.y2) };
        default: return { x: 0, y: 0 };
    }
}

function showDeleteBtn(idx) {
    if (idx === deleteBtnIdx) return;
    // Remove old
    if (deleteBtn) { deleteBtn.remove(); deleteBtn = null; }
    if (dupBtn) { dupBtn.remove(); dupBtn = null; }
    deleteBtnIdx = -1;
    if (idx < 0) return;

    const pos = getShapeTopRight(idx);

    // Duplicate button
    dupBtn = document.createElement('button');
    dupBtn.className = 'geo-dup-btn';
    dupBtn.innerHTML = '<svg viewBox="0 0 16 16" width="14" height="14" style="vertical-align:middle;"><rect x="1" y="4" width="8" height="8" rx="1" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/><rect x="5" y="1" width="8" height="8" rx="1" fill="white" stroke="#64748b" stroke-width="1.5"/></svg>';
    dupBtn.title = 'Dupliker';
    dupBtn.style.left = (pos.x + 4) + 'px';
    dupBtn.style.top = (pos.y - 32) + 'px';
    dupBtn.addEventListener('mousedown', (ev) => {
        ev.stopPropagation();
        undoStack.push(JSON.parse(JSON.stringify(shapes)));
        const copy = JSON.parse(JSON.stringify(shapes[idx]));
        moveShape(copy, 20, 20);
        shapes.push(copy);
        redrawCanvas();
        showDeleteBtn(shapes.length - 1);
    });
    canvas.parentElement.appendChild(dupBtn);

    // Delete button
    deleteBtn = document.createElement('button');
    deleteBtn.className = 'geo-delete-btn';
    deleteBtn.innerHTML = '🗑';
    deleteBtn.title = 'Slet';
    deleteBtn.style.left = (pos.x + 32) + 'px';
    deleteBtn.style.top = (pos.y - 32) + 'px';
    deleteBtn.addEventListener('mousedown', (ev) => {
        ev.stopPropagation();
        undoStack.push(JSON.parse(JSON.stringify(shapes)));
        shapes.splice(idx, 1);
        redrawCanvas();
        if (deleteBtn) { deleteBtn.remove(); deleteBtn = null; }
        if (dupBtn) { dupBtn.remove(); dupBtn = null; }
        deleteBtnIdx = -1;
    });
    canvas.parentElement.appendChild(deleteBtn);
    deleteBtnIdx = idx;
}

// Hide delete button when switching tools
const origSetGeoTool = setGeoTool;
setGeoTool = function(tool) {
    if (deleteBtn) { deleteBtn.remove(); deleteBtn = null; }
    if (dupBtn) { dupBtn.remove(); dupBtn = null; }
    deleteBtnIdx = -1;
    anglePoints = []; // Reset angle points when switching tools
    origSetGeoTool(tool);
};

// Bounding box for shapes
function getShapeBounds(s) {
    switch (s.type) {
        case 'rect': {
            const rx = s.w < 0 ? s.x + s.w : s.x;
            const ry = s.h < 0 ? s.y + s.h : s.y;
            return { x: rx, y: ry, w: Math.abs(s.w), h: Math.abs(s.h) };
        }
        case 'diamond': return { x: s.cx - s.hw, y: s.cy - s.hh, w: s.hw * 2, h: s.hh * 2 };
        case 'circle': return { x: s.cx - s.r, y: s.cy - s.r, w: s.r * 2, h: s.r * 2 };
        case 'line': {
            const x = Math.min(s.x1, s.x2), y = Math.min(s.y1, s.y2);
            return { x, y, w: Math.abs(s.x2 - s.x1), h: Math.abs(s.y2 - s.y1) };
        }
        case 'triangle': {
            const x = Math.min(s.x1, s.x2, s.x3), y = Math.min(s.y1, s.y2, s.y3);
            return { x, y, w: Math.max(s.x1, s.x2, s.x3) - x, h: Math.max(s.y1, s.y2, s.y3) - y };
        }
        case 'text': {
            ctx.font = (s.fontSize || s.width * 8) + 'px sans-serif';
            const tw = ctx.measureText(s.text).width;
            return { x: s.x, y: s.y - s.width * 8, w: tw, h: s.width * 8 };
        }
        case 'freehand': {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            s.points.forEach(p => { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); });
            return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
        }
        case 'angle': {
            const ax = Math.min(s.vx, s.x1, s.x2), ay = Math.min(s.vy, s.y1, s.y2);
            return { x: ax, y: ay, w: Math.max(s.vx, s.x1, s.x2) - ax, h: Math.max(s.vy, s.y1, s.y2) - ay };
        }
        default: return { x: 0, y: 0, w: 0, h: 0 };
    }
}

function resizeShape(shape, scaleX, scaleY, anchorX, anchorY) {
    switch (shape.type) {
        case 'rect':
            shape.w *= scaleX;
            shape.h *= scaleY;
            break;
        case 'diamond':
            shape.hw *= scaleX;
            shape.hh *= scaleY;
            break;
        case 'circle':
            shape.r *= Math.max(scaleX, scaleY);
            break;
        case 'line':
            shape.x2 = anchorX + (shape.x2 - anchorX) * scaleX;
            shape.y2 = anchorY + (shape.y2 - anchorY) * scaleY;
            break;
        case 'triangle':
            [['x1','y1'],['x2','y2'],['x3','y3']].forEach(([px,py]) => {
                shape[px] = anchorX + (shape[px] - anchorX) * scaleX;
                shape[py] = anchorY + (shape[py] - anchorY) * scaleY;
            });
            break;
        case 'text':
            shape.width = Math.max(1, Math.round(shape.width * Math.max(scaleX, scaleY)));
            break;
        case 'freehand':
            shape.points.forEach(p => {
                p.x = anchorX + (p.x - anchorX) * scaleX;
                p.y = anchorY + (p.y - anchorY) * scaleY;
            });
            break;
        case 'angle':
            shape.vx = anchorX + (shape.vx - anchorX) * scaleX;
            shape.vy = anchorY + (shape.vy - anchorY) * scaleY;
            shape.x1 = anchorX + (shape.x1 - anchorX) * scaleX;
            shape.y1 = anchorY + (shape.y1 - anchorY) * scaleY;
            shape.x2 = anchorX + (shape.x2 - anchorX) * scaleX;
            shape.y2 = anchorY + (shape.y2 - anchorY) * scaleY;
            break;
    }
}

// Draw resize handle
function drawResizeHandle(idx) {
    const bounds = getShapeBounds(shapes[idx]);
    const hx = bounds.x + bounds.w;
    const hy = bounds.y + bounds.h;
    ctx.fillStyle = '#2563eb';
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.fillRect(hx - 5, hy - 5, 10, 10);
    ctx.strokeRect(hx - 5, hy - 5, 10, 10);
}

function hitResizeHandle(idx, mx, my) {
    const shape = shapes[idx];
    const bounds = getShapeBounds(shape);
    // Local coords of resize handle
    const lx = bounds.x + bounds.w;
    const ly = bounds.y + bounds.h;
    // Rotate to world coords
    if (shape.rotation) {
        const c = getShapeCenter(shape);
        const cos = Math.cos(shape.rotation);
        const sin = Math.sin(shape.rotation);
        const dx = lx - c.x, dy = ly - c.y;
        const wx = c.x + dx * cos - dy * sin;
        const wy = c.y + dx * sin + dy * cos;
        return Math.abs(mx - wx) < 8 && Math.abs(my - wy) < 8;
    }
    return Math.abs(mx - lx) < 8 && Math.abs(my - ly) < 8;
}

// Select, drag, resize & rotate
let selectedShape = -1;
let dragOffsetX = 0, dragOffsetY = 0, isDragging = false, isShapeResizing = false, isRotating = false, dragStartX = 0, dragStartY = 0, rotateStartAngle = 0;

canvas.addEventListener('mousedown', (e) => {
    if (editingMeasurement) return;
    if (currentTool === 'select') {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // Check rotation handle first
        if (selectedShape >= 0 && hitRotateHandle(selectedShape, mx, my)) {
            isRotating = true;
            const c = getShapeCenter(shapes[selectedShape]);
            rotateStartAngle = Math.atan2(my - c.y, mx - c.x) - (shapes[selectedShape].rotation || 0);
            undoStack.push(JSON.parse(JSON.stringify(shapes)));
            canvas.style.cursor = 'grabbing';
            return;
        }

        // Check resize handle
        if (selectedShape >= 0 && hitResizeHandle(selectedShape, mx, my)) {
            isShapeResizing = true;
            dragStartX = mx;
            dragStartY = my;
            undoStack.push(JSON.parse(JSON.stringify(shapes)));
            canvas.style.cursor = 'nwse-resize';
            return;
        }

        selectedShape = hitTestShape(mx, my);
        showDeleteBtn(selectedShape);
        redrawCanvas();
        if (selectedShape >= 0) {
            isDragging = true;
            dragStartX = mx;
            dragStartY = my;
            undoStack.push(JSON.parse(JSON.stringify(shapes)));
            canvas.style.cursor = 'move';
            drawSelectionUI(selectedShape);
        }
        return;
    }
});

function drawSelectionUI(idx) {
    if (idx < 0 || idx >= shapes.length) return;
    const shape = shapes[idx];
    const bounds = getShapeBounds(shape);
    const pad = 6;
    ctx.save();

    // Apply rotation to selection UI too
    if (shape.rotation) {
        const c = getShapeCenter(shape);
        ctx.translate(c.x, c.y);
        ctx.rotate(shape.rotation);
        ctx.translate(-c.x, -c.y);
    }

    const snapColor = shape._rotSnapped ? '#10b981' : '#2563eb';

    ctx.strokeStyle = snapColor;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.rect(bounds.x - pad, bounds.y - pad, bounds.w + pad * 2, bounds.h + pad * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Resize handle (bottom-right)
    const hx = bounds.x + bounds.w;
    const hy = bounds.y + bounds.h;
    ctx.fillStyle = snapColor;
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.fillRect(hx - 5, hy - 5, 10, 10);
    ctx.strokeRect(hx - 5, hy - 5, 10, 10);

    // Rotation handle (top-center, above shape)
    const rhx = bounds.x + bounds.w / 2;
    const rhy = bounds.y - pad - 24;
    // Line from top-center to rotation handle
    ctx.strokeStyle = snapColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(rhx, bounds.y - pad);
    ctx.lineTo(rhx, rhy + 7);
    ctx.stroke();
    // Circle handle
    ctx.beginPath();
    ctx.arc(rhx, rhy, 7, 0, Math.PI * 2);
    ctx.fillStyle = snapColor;
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Arrow icon inside
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(rhx, rhy, 3.5, -Math.PI * 0.8, Math.PI * 0.5);
    ctx.stroke();
    // Arrowhead
    const ax = rhx + 3.5 * Math.cos(Math.PI * 0.5);
    const ay = rhy + 3.5 * Math.sin(Math.PI * 0.5);
    ctx.beginPath();
    ctx.moveTo(ax - 2, ay - 2);
    ctx.lineTo(ax, ay);
    ctx.lineTo(ax + 2, ay - 2);
    ctx.stroke();

    ctx.restore();
}

function getRotateHandlePos(idx) {
    const shape = shapes[idx];
    const bounds = getShapeBounds(shape);
    const pad = 6;
    // Position in local (un-rotated) coords
    const lx = bounds.x + bounds.w / 2;
    const ly = bounds.y - pad - 24;
    // Rotate to world coords if shape is rotated
    if (shape.rotation) {
        const c = getShapeCenter(shape);
        const cos = Math.cos(shape.rotation);
        const sin = Math.sin(shape.rotation);
        const dx = lx - c.x, dy = ly - c.y;
        return { x: c.x + dx * cos - dy * sin, y: c.y + dx * sin + dy * cos };
    }
    return { x: lx, y: ly };
}

function hitRotateHandle(idx, mx, my) {
    const pos = getRotateHandlePos(idx);
    return Math.sqrt((mx - pos.x) ** 2 + (my - pos.y) ** 2) < 12;
}

function updateActionBtns() {
    if (selectedShape >= 0) {
        const pos = getShapeTopRight(selectedShape);
        if (dupBtn) { dupBtn.style.left = (pos.x + 4) + 'px'; dupBtn.style.top = (pos.y - 32) + 'px'; }
        if (deleteBtn) { deleteBtn.style.left = (pos.x + 32) + 'px'; deleteBtn.style.top = (pos.y - 32) + 'px'; }
    }
}

canvas.addEventListener('mousemove', (e) => {
    // Handle rotation
    if (currentTool === 'select' && isRotating && selectedShape >= 0) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const c = getShapeCenter(shapes[selectedShape]);
        let newAngle = Math.atan2(my - c.y, mx - c.x) - rotateStartAngle;

        // Snap rotation to 0, 45, 90, 135, 180, etc. within 0.5°
        const ROTATE_SNAP_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315, 360];
        const ROTATE_SNAP_THRESHOLD = 0.5;
        let degAngle = ((newAngle * 180 / Math.PI) % 360 + 360) % 360;
        let rotSnapped = false;
        for (const sa of ROTATE_SNAP_ANGLES) {
            const diff = Math.abs(degAngle - sa);
            if (diff <= ROTATE_SNAP_THRESHOLD || diff >= 360 - ROTATE_SNAP_THRESHOLD) {
                newAngle = (sa % 360) * Math.PI / 180;
                rotSnapped = true;
                break;
            }
        }

        shapes[selectedShape].rotation = newAngle;
        shapes[selectedShape]._rotSnapped = rotSnapped;
        redrawCanvas();
        drawSelectionUI(selectedShape);

        // Show snap indicator
        if (rotSnapped) {
            const rp = getRotateHandlePos(selectedShape);
            ctx.save();
            ctx.beginPath();
            ctx.arc(rp.x, rp.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#10b98144';
            ctx.fill();
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Show snapped degree
            const snapDeg = Math.round(((newAngle * 180 / Math.PI) % 360 + 360) % 360);
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#10b981';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(snapDeg + '°', rp.x, rp.y - 14);
            ctx.restore();
        }

        updateActionBtns();
        return;
    }

    if (currentTool === 'select' && isShapeResizing && selectedShape >= 0) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const bounds = getShapeBounds(shapes[selectedShape]);
        const newW = bounds.w + (mx - dragStartX);
        const newH = bounds.h + (my - dragStartY);
        const scaleX = bounds.w > 0 ? newW / bounds.w : 1;
        const scaleY = bounds.h > 0 ? newH / bounds.h : 1;
        if (scaleX > 0.1 && scaleY > 0.1) {
            resizeShape(shapes[selectedShape], scaleX, scaleY, bounds.x, bounds.y);
            dragStartX = mx;
            dragStartY = my;
        }
        redrawCanvas();
        drawSelectionUI(selectedShape);
        updateActionBtns();
        return;
    }

    if (currentTool === 'select' && isDragging && selectedShape >= 0) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const dx = mx - dragStartX;
        const dy = my - dragStartY;
        moveShape(shapes[selectedShape], dx, dy);
        dragStartX = mx;
        dragStartY = my;
        redrawCanvas();
        drawSelectionUI(selectedShape);
        updateActionBtns();
        return;
    }

    // Change cursor on hover
    if (currentTool === 'select' && !isDragging && !isShapeResizing && !isRotating) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        if (selectedShape >= 0 && hitRotateHandle(selectedShape, mx, my)) {
            canvas.style.cursor = 'grab';
        } else if (selectedShape >= 0 && hitResizeHandle(selectedShape, mx, my)) {
            canvas.style.cursor = 'nwse-resize';
        } else {
            canvas.style.cursor = hitTestShape(mx, my) >= 0 ? 'move' : 'default';
        }
    }
});

canvas.addEventListener('mouseup', () => {
    if (currentTool === 'select') {
        if (isRotating && selectedShape >= 0) {
            delete shapes[selectedShape]._rotSnapped;
        }
        isDragging = false;
        isShapeResizing = false;
        isRotating = false;
        canvas.style.cursor = 'default';
        if (selectedShape >= 0) {
            redrawCanvas();
            drawSelectionUI(selectedShape);
        }
    }
});

// Canvas mouse events - drawing tools
canvas.addEventListener('mousedown', (e) => {
    if (editingMeasurement) return;
    if (currentTool === 'select' || currentTool === 'graph') return;

    // Angle tool: click-based (3 points)
    if (currentTool === 'angle') {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        anglePoints.push({ x: mx, y: my });

        if (anglePoints.length < 3) {
            // Preview: redraw with current points
            redrawCanvas();
            const color = document.getElementById('geoColor').value;
            const width = parseInt(document.getElementById('geoWidth').value);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.setLineDash([5, 5]);

            // Draw existing arm(s)
            if (anglePoints.length >= 1) {
                // Draw dots for placed points
                anglePoints.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                });
            }
            if (anglePoints.length === 2) {
                // Draw first arm (vertex to first point)
                ctx.beginPath();
                ctx.moveTo(anglePoints[1].x, anglePoints[1].y);
                ctx.lineTo(anglePoints[0].x, anglePoints[0].y);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        if (anglePoints.length === 3) {
            // Complete: create angle shape with snapping
            const [p1, vertex, rawP3] = anglePoints;
            const snap = snapAnglePoint(vertex, p1, rawP3);
            const p3 = { x: snap.x, y: snap.y };
            const color = document.getElementById('geoColor').value;
            const width = parseInt(document.getElementById('geoWidth').value);

            // Calculate angle
            const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
            const a2 = Math.atan2(p3.y - vertex.y, p3.x - vertex.x);
            let angle = a2 - a1;
            // Normalize to [0, 2π)
            while (angle < 0) angle += Math.PI * 2;
            // Use the smaller angle
            if (angle > Math.PI) angle = Math.PI * 2 - angle;
            const degrees = snap.snapped ? snap.snapDeg : +(angle * 180 / Math.PI).toFixed(1);

            const shape = {
                type: 'angle',
                vx: vertex.x, vy: vertex.y,
                x1: p1.x, y1: p1.y,
                x2: p3.x, y2: p3.y,
                degrees: degrees,
                color, width
            };

            undoStack.push([...shapes]);
            shapes.push(shape);
            anglePoints = [];
            redrawCanvas();
            setGeoTool('select');
            selectedShape = shapes.length - 1;
            showDeleteBtn(selectedShape);
        }
        return;
    }

    const rect = canvas.getBoundingClientRect();
    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;
    isDrawing = true;

    if (currentTool === 'freehand') {
        freehandPoints = [{ x: startX, y: startY }];
    }

    if (currentTool === 'text') {
        // Text tool: drag to define box, then type
        const existing = document.querySelector('.geo-text-input');
        if (existing) existing.remove();
        // isDrawing stays true - we use mousemove/mouseup to define box size
    }
});

// Angle tool preview on mousemove
canvas.addEventListener('mousemove', (e) => {
    if (currentTool !== 'angle' || anglePoints.length === 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const color = document.getElementById('geoColor').value;
    const width = parseInt(document.getElementById('geoWidth').value);

    redrawCanvas();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash([5, 5]);

    // Draw placed points
    anglePoints.forEach(p => {
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.setLineDash([5, 5]);
    });

    if (anglePoints.length === 1) {
        // Preview line from first point to mouse (will be arm1 → vertex)
        ctx.beginPath();
        ctx.moveTo(anglePoints[0].x, anglePoints[0].y);
        ctx.lineTo(mx, my);
        ctx.stroke();
    } else if (anglePoints.length === 2) {
        // Snap the preview point
        const vertex = anglePoints[1];
        const snap = snapAnglePoint(vertex, anglePoints[0], { x: mx, y: my });
        const sx = snap.x, sy = snap.y;

        // Draw first arm and preview second arm
        ctx.beginPath();
        ctx.moveTo(anglePoints[0].x, anglePoints[0].y);
        ctx.lineTo(vertex.x, vertex.y);
        ctx.lineTo(sx, sy);
        if (snap.snapped) {
            ctx.setLineDash([]);
            ctx.strokeStyle = '#10b981'; // Green when snapped
        }
        ctx.stroke();

        // Preview angle arc and degrees
        const a1 = Math.atan2(anglePoints[0].y - vertex.y, anglePoints[0].x - vertex.x);
        const a2 = Math.atan2(sy - vertex.y, sx - vertex.x);
        let aDiff = a2 - a1;
        while (aDiff < -Math.PI) aDiff += Math.PI * 2;
        while (aDiff > Math.PI) aDiff -= Math.PI * 2;
        const arcCCW = aDiff < 0;
        const deg = snap.snapped ? snap.snapDeg : +(Math.abs(aDiff) * 180 / Math.PI).toFixed(1);
        const arcR = Math.min(25,
            Math.sqrt((anglePoints[0].x - vertex.x) ** 2 + (anglePoints[0].y - vertex.y) ** 2) * 0.3,
            Math.sqrt((sx - vertex.x) ** 2 + (sy - vertex.y) ** 2) * 0.3
        );
        ctx.strokeStyle = snap.snapped ? '#10b981' : color;
        ctx.beginPath();
        ctx.arc(vertex.x, vertex.y, arcR, a1, a2, arcCCW);
        ctx.stroke();

        // Degree label
        ctx.setLineDash([]);
        const midAngle = a1 + aDiff / 2;
        const labelR = arcR + 16;
        ctx.font = snap.snapped ? 'bold 13px sans-serif' : '12px sans-serif';
        ctx.fillStyle = snap.snapped ? '#10b981' : color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const degText = typeof deg === 'number' && deg === Math.round(deg) ? deg.toFixed(0) : String(deg);
        ctx.fillText(degText + '°', vertex.x + Math.cos(midAngle) * labelR, vertex.y + Math.sin(midAngle) * labelR);

        // Snap indicator dot on the snapped point
        if (snap.snapped) {
            ctx.beginPath();
            ctx.arc(sx, sy, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#10b98133';
            ctx.fill();
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }
    ctx.setLineDash([]);
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (currentTool === 'freehand') {
        freehandPoints.push({ x: mx, y: my });
        redrawCanvas();
        // Draw current freehand
        ctx.strokeStyle = document.getElementById('geoColor').value;
        ctx.lineWidth = parseInt(document.getElementById('geoWidth').value);
        ctx.beginPath();
        ctx.moveTo(freehandPoints[0].x, freehandPoints[0].y);
        for (let i = 1; i < freehandPoints.length; i++) {
            ctx.lineTo(freehandPoints[i].x, freehandPoints[i].y);
        }
        ctx.stroke();
        return;
    }

    // Preview shape
    redrawCanvas();
    ctx.strokeStyle = document.getElementById('geoColor').value;
    ctx.lineWidth = parseInt(document.getElementById('geoWidth').value);
    ctx.setLineDash([5, 5]);

    switch (currentTool) {
        case 'line':
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(mx, my);
            ctx.stroke();
            break;
        case 'rect':
            ctx.beginPath();
            ctx.rect(startX, startY, mx - startX, my - startY);
            ctx.stroke();
            break;
        case 'square': {
            const sd = Math.sign(mx - startX) * Math.min(Math.abs(mx - startX), Math.abs(my - startY));
            const sd2 = Math.sign(my - startY) * Math.abs(sd);
            ctx.beginPath();
            ctx.rect(startX, startY, sd, sd2);
            ctx.stroke();
            break;
        }
        case 'diamond': {
            const dcx = (startX + mx) / 2, dcy = (startY + my) / 2;
            const dhw = Math.abs(mx - startX) / 2, dhh = Math.abs(my - startY) / 2;
            ctx.beginPath();
            ctx.moveTo(dcx, dcy - dhh);
            ctx.lineTo(dcx + dhw, dcy);
            ctx.lineTo(dcx, dcy + dhh);
            ctx.lineTo(dcx - dhw, dcy);
            ctx.closePath();
            ctx.stroke();
            break;
        }
        case 'circle':
        case 'circle-dot': {
            const r = Math.sqrt((mx - startX) ** 2 + (my - startY) ** 2);
            ctx.beginPath();
            ctx.arc(startX, startY, r, 0, Math.PI * 2);
            ctx.stroke();
            if (currentTool === 'circle-dot') {
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(startX, startY, 3, 0, Math.PI * 2);
                ctx.fillStyle = document.getElementById('geoColor').value;
                ctx.fill();
            }
            break;
        }
        case 'triangle':
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(mx, my);
            ctx.lineTo(startX - (mx - startX), my);
            ctx.closePath();
            ctx.stroke();
            break;
        case 'triangle-right':
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(startX, my);
            ctx.lineTo(mx, my);
            ctx.closePath();
            ctx.stroke();
            break;
        case 'triangle-iso':
            ctx.beginPath();
            ctx.moveTo((startX + mx) / 2, startY);
            ctx.lineTo(mx, my);
            ctx.lineTo(startX, my);
            ctx.closePath();
            ctx.stroke();
            break;
        case 'triangle-right-iso': {
            const tside = Math.min(Math.abs(mx - startX), Math.abs(my - startY));
            const tsx = Math.sign(mx - startX), tsy = Math.sign(my - startY);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(startX, startY + tside * tsy);
            ctx.lineTo(startX + tside * tsx, startY + tside * tsy);
            ctx.closePath();
            ctx.stroke();
            break;
        }
        case 'text':
            ctx.beginPath();
            ctx.rect(startX, startY, mx - startX, my - startY);
            ctx.stroke();
            // Show "T" preview
            const previewH = Math.abs(my - startY);
            if (previewH > 10) {
                ctx.setLineDash([]);
                ctx.fillStyle = document.getElementById('geoColor').value + '44';
                ctx.font = (previewH * 0.7) + 'px sans-serif';
                ctx.fillText('T', Math.min(startX, mx) + 6, Math.max(startY, my) - previewH * 0.15);
            }
            break;
    }
    ctx.setLineDash([]);

    // Live measurements while drawing
    if (document.getElementById('geoMeasure')?.checked) {
        ctx.save();
        ctx.font = '11px sans-serif';
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const tool = currentTool;

        if (tool === 'rect' || tool === 'square' || tool === 'text') {
            let dw = mx - startX, dh = my - startY;
            if (tool === 'square') {
                const s = Math.sign(dw) * Math.min(Math.abs(dw), Math.abs(dh));
                dw = s; dh = Math.sign(dh) * Math.abs(s);
            }
            const bx = dw < 0 ? startX + dw : startX;
            const by = dh < 0 ? startY + dh : startY;
            const bw = Math.abs(dw), bh = Math.abs(dh);
            ctx.fillText('b = ' + fmtCm(bw) + ' cm', bx + bw / 2, by + bh + 14);
            ctx.textAlign = 'right';
            ctx.fillText('h = ' + fmtCm(bh) + ' cm', bx - 8, by + bh / 2);
        } else if (tool === 'diamond') {
            const dcx = (startX + mx) / 2, dcy = (startY + my) / 2;
            const dhw = Math.abs(mx - startX) / 2, dhh = Math.abs(my - startY) / 2;
            ctx.fillText('b = ' + fmtCm(dhw * 2) + ' cm', dcx, dcy + dhh + 14);
            ctx.textAlign = 'right';
            ctx.fillText('h = ' + fmtCm(dhh * 2) + ' cm', dcx - dhw - 8, dcy);
        } else if (tool === 'circle') {
            const r = Math.sqrt((mx - startX) ** 2 + (my - startY) ** 2);
            ctx.fillText('r = ' + fmtCm(r) + ' cm', startX + r / 2, startY - 10);
        } else if (tool === 'line') {
            const len = Math.sqrt((mx - startX) ** 2 + (my - startY) ** 2);
            const midX = (startX + mx) / 2, midY = (startY + my) / 2;
            const ndx = my - startY, ndy = -(mx - startX);
            const nd = Math.sqrt(ndx * ndx + ndy * ndy) || 1;
            ctx.fillText(fmtCm(len) + ' cm', midX + ndx / nd * 12, midY + ndy / nd * 12);
        } else if (tool.startsWith('triangle')) {
            let pts;
            if (tool === 'triangle') pts = [{x:startX,y:startY},{x:mx,y:my},{x:startX-(mx-startX),y:my}];
            else if (tool === 'triangle-right') pts = [{x:startX,y:startY},{x:startX,y:my},{x:mx,y:my}];
            else if (tool === 'triangle-iso') pts = [{x:(startX+mx)/2,y:startY},{x:mx,y:my},{x:startX,y:my}];
            else if (tool === 'triangle-right-iso') {
                const ts = Math.min(Math.abs(mx-startX),Math.abs(my-startY));
                const tsx = Math.sign(mx-startX), tsy = Math.sign(my-startY);
                pts = [{x:startX,y:startY},{x:startX,y:startY+ts*tsy},{x:startX+ts*tsx,y:startY+ts*tsy}];
            }
            if (pts) {
                for (let i = 0; i < 3; i++) {
                    const a = pts[i], b = pts[(i+1)%3];
                    const len = Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2);
                    const midX = (a.x+b.x)/2, midY = (a.y+b.y)/2;
                    const ndx = b.y-a.y, ndy = -(b.x-a.x);
                    const nd = Math.sqrt(ndx*ndx+ndy*ndy) || 1;
                    ctx.textAlign = 'center';
                    ctx.fillText(fmtCm(len)+' cm', midX+ndx/nd*14, midY+ndy/nd*14);
                }
            }
        }
        ctx.restore();
    }
});

canvas.addEventListener('mouseup', (e) => {
    if (!isDrawing) return;
    isDrawing = false;
    const rect = canvas.getBoundingClientRect();
    const endX = e.clientX - rect.left;
    const endY = e.clientY - rect.top;
    const color = document.getElementById('geoColor').value;
    const width = parseInt(document.getElementById('geoWidth').value);
    const fill = document.getElementById('geoFill').checked;

    let shape = null;

    switch (currentTool) {
        case 'line':
            shape = { type: 'line', x1: startX, y1: startY, x2: endX, y2: endY, color, width };
            break;
        case 'rect':
            shape = { type: 'rect', x: startX, y: startY, w: endX - startX, h: endY - startY, color, width, fill };
            break;
        case 'square': {
            const side = Math.sign(endX - startX) * Math.min(Math.abs(endX - startX), Math.abs(endY - startY));
            const side2 = Math.sign(endY - startY) * Math.abs(side);
            shape = { type: 'rect', x: startX, y: startY, w: side, h: side2, color, width, fill };
            break;
        }
        case 'diamond': {
            const dcx = (startX + endX) / 2, dcy = (startY + endY) / 2;
            const dhw = Math.abs(endX - startX) / 2, dhh = Math.abs(endY - startY) / 2;
            shape = { type: 'diamond', cx: dcx, cy: dcy, hw: dhw, hh: dhh, color, width, fill };
            break;
        }
        case 'circle':
        case 'circle-dot': {
            const r = Math.sqrt((endX - startX) ** 2 + (endY - startY) ** 2);
            shape = { type: 'circle', cx: startX, cy: startY, r, color, width, fill, dotCenter: currentTool === 'circle-dot' };
            break;
        }
        case 'triangle':
            shape = {
                type: 'triangle',
                x1: startX, y1: startY,
                x2: endX, y2: endY,
                x3: startX - (endX - startX), y3: endY,
                color, width, fill
            };
            break;
        case 'triangle-right':
            shape = {
                type: 'triangle',
                x1: startX, y1: startY,
                x2: startX, y2: endY,
                x3: endX, y3: endY,
                color, width, fill
            };
            break;
        case 'triangle-iso':
            shape = {
                type: 'triangle',
                x1: (startX + endX) / 2, y1: startY,
                x2: endX, y2: endY,
                x3: startX, y3: endY,
                color, width, fill
            };
            break;
        case 'triangle-right-iso': {
            const ts = Math.min(Math.abs(endX - startX), Math.abs(endY - startY));
            const tsx = Math.sign(endX - startX), tsy = Math.sign(endY - startY);
            shape = {
                type: 'triangle',
                x1: startX, y1: startY,
                x2: startX, y2: startY + ts * tsy,
                x3: startX + ts * tsx, y3: startY + ts * tsy,
                color, width, fill
            };
            break;
        }
        case 'freehand':
            shape = { type: 'freehand', points: [...freehandPoints], color, width };
            freehandPoints = [];
            break;
        case 'text': {
            const bx = Math.min(startX, endX);
            const by = Math.min(startY, endY);
            const bw = Math.abs(endX - startX);
            const bh = Math.abs(endY - startY);
            if (bw > 10 && bh > 10) {
                // Create resizable text input
                const existing = document.querySelector('.geo-text-input');
                if (existing) existing.remove();
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'geo-text-input';
                input.placeholder = 'Skriv her...';
                const fontSize = bh * 0.7;
                input.style.cssText = `
                    position:absolute;
                    left:${bx}px;
                    top:${by}px;
                    width:${bw}px;
                    height:${bh}px;
                    font-size:${fontSize}px;
                    font-family:sans-serif;
                    color:${color};
                    background:rgba(255,255,255,0.95);
                    border:2px solid ${color};
                    border-radius:4px;
                    padding:0 6px;
                    outline:none;
                    z-index:20;
                    box-sizing:border-box;
                `;
                canvas.parentElement.appendChild(input);
                setTimeout(() => input.focus(), 10);

                let committed = false;
                const commitText = () => {
                    if (committed) return;
                    committed = true;
                    const text = input.value.trim();
                    if (text) {
                        // Calculate width factor from box height
                        shapes.push({
                            type: 'text',
                            x: bx,
                            y: by + bh * 0.8,
                            text: text,
                            color: color,
                            width: 2,
                            fontSize: fontSize
                        });
                        redrawCanvas();
                    }
                    if (input.parentElement) input.remove();
                };

                input.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter') { ev.preventDefault(); commitText(); setGeoTool('select'); }
                    if (ev.key === 'Escape') { committed = true; input.remove(); }
                });
                input.addEventListener('blur', () => setTimeout(commitText, 100));
            }
            // Don't auto-switch to select for text - wait for input
            return;
        }
    }

    if (shape) {
        undoStack.push([...shapes]);
        shapes.push(shape);
        redrawCanvas();
        // Auto-switch to select after drawing a shape
        setGeoTool('select');
        selectedShape = shapes.length - 1;
        showDeleteBtn(selectedShape);
    }
});

// Cancel drawing if mouse leaves canvas
canvas.addEventListener('mouseleave', () => {
    if (isDrawing) {
        isDrawing = false;
        redrawCanvas();
    }
});

// Fallback: reset drawing state on any document mouseup
document.addEventListener('mouseup', () => {
    if (isDrawing) {
        isDrawing = false;
        redrawCanvas();
    }
});

function undoGeo() {
    if (undoStack.length > 0) {
        shapes = undoStack.pop();
        redrawCanvas();
    }
}

function clearCanvas() {
    undoStack.push([...shapes]);
    shapes = [];
    graphs = [];
    redrawCanvas();
}

function parseGraphFunction(expr) {
    const sanitized = expr
        .replace(/\^/g, '**')
        .replace(/sin/g, 'Math.sin')
        .replace(/cos/g, 'Math.cos')
        .replace(/tan/g, 'Math.tan')
        .replace(/sqrt/g, 'Math.sqrt')
        .replace(/abs/g, 'Math.abs')
        .replace(/log/g, 'Math.log10')
        .replace(/ln/g, 'Math.log')
        .replace(/pi/g, 'Math.PI')
        .replace(/e(?![a-zA-Z])/g, 'Math.E');

    return function(x) {
        try {
            return Function('x', '"use strict"; return (' + sanitized + ')')(x);
        } catch {
            return NaN;
        }
    };
}

function drawGraphLine(fn, color) {
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const step = 20; // pixels per unit

    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    let started = false;

    for (let px = 0; px < w; px++) {
        const x = (px - cx) / step;
        const y = fn(x);
        const py = cy - y * step;

        if (isNaN(y) || !isFinite(y) || py < -1000 || py > h + 1000) {
            started = false;
            continue;
        }

        if (!started) {
            ctx.moveTo(px, py);
            started = true;
        } else {
            ctx.lineTo(px, py);
        }
    }
    ctx.stroke();
}

function drawGraph() {
    const expr = document.getElementById('graphFunc').value.trim();
    if (!expr) return;
    const fn = parseGraphFunction(expr);
    const color = document.getElementById('geoColor').value;
    graphs.push({ fn, color, expr });
    redrawCanvas();
}

function clearGraphs() {
    graphs = [];
    redrawCanvas();
}

function randomGraph() {
    const examples = [
        '2*x+3', 'x^2', '-0.5*x^2+4', 'x^3/10', 'sin(x)*3',
        'cos(x)*2', '3*sin(x)+x', 'sqrt(abs(x))*3', '1/x',
        'x^2-2*x-3', '0.1*x^3-x', 'tan(x)', '2^x/5', 'abs(x)-3'
    ];
    const expr = examples[Math.floor(Math.random() * examples.length)];
    document.getElementById('graphFunc').value = expr;
    showAxes = true;
    document.getElementById('axesBtn').classList.add('active');
    showGrid = true;
    document.getElementById('gridBtn').classList.add('active');
    drawGraph();
}

// ========================
let snipStartX, snipStartY, snipOverlay = null;

function startSnip(e) {
    if (currentTool !== 'snip') return;
    const rect = canvas.getBoundingClientRect();
    snipStartX = e.clientX - rect.left;
    snipStartY = e.clientY - rect.top;

    // Create overlay
    if (snipOverlay) snipOverlay.remove();
    snipOverlay = document.createElement('div');
    snipOverlay.className = 'snip-overlay';
    canvas.parentElement.appendChild(snipOverlay);
    canvas.parentElement.classList.add('snip-active');

    const onMove = (ev) => {
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        const x = Math.min(snipStartX, mx);
        const y = Math.min(snipStartY, my);
        const w = Math.abs(mx - snipStartX);
        const h = Math.abs(my - snipStartY);
        snipOverlay.style.left = x + 'px';
        snipOverlay.style.top = y + 'px';
        snipOverlay.style.width = w + 'px';
        snipOverlay.style.height = h + 'px';
    };

    const onUp = (ev) => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        canvas.parentElement.classList.remove('snip-active');

        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        const x = Math.max(0, Math.min(snipStartX, mx));
        const y = Math.max(0, Math.min(snipStartY, my));
        const w = Math.abs(mx - snipStartX);
        const h = Math.abs(my - snipStartY);

        if (snipOverlay) snipOverlay.remove();
        snipOverlay = null;

        if (w < 5 || h < 5) return; // For lille udsnit

        // Klip udsnittet fra canvas
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = w;
        tmpCanvas.height = h;
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(canvas, x, y, w, h, 0, 0, w, h);

        const dataUrl = tmpCanvas.toDataURL('image/png');
        const html = `<img src="${dataUrl}" style="max-width:100%; height:auto;" alt="Udsnit"><br>`;
        editor.focus();
        document.execCommand('insertHTML', false, html);
        updateCounts();

        // Skift tilbage til select
        setGeoTool('select');
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

// Hook snip into canvas mousedown (runs before the shape drawing handler)
canvas.addEventListener('mousedown', (e) => {
    if (editingMeasurement) return;
    if (currentTool === 'snip') {
        startSnip(e);
        e.stopImmediatePropagation();
    }
}, true);
